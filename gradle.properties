org.gradle.parallel=true
org.gradle.caching=true
org.gradle.jvmargs=-Xmx2g

# THE version — the single source of truth. The root build reads it into every
# module; core's processResources expands it into plugin.yml, from which both
# Mental.version() (getDescription().getVersion()) and bStats read. The number
# continues Mental's public 2.x release line (the legacy StrikeSync v4.x tags
# are history in the same graph, not a floor — the releaser baselines the
# changelog by ancestry, not version sort). This is the first NON-beta of the
# 2.3 series — the full-range release: the one Multi-Release mega-jar covering
# Paper 1.9.4 → 26.x with no holes and no server flags. Because it is
# hyphenless, the auto-releaser publishes a FULL release and moves the "latest"
# marker onto it (a hyphenated suffix like -beta makes the releaser publish a
# GitHub pre-release and leave "latest" alone — kept for future betas).
version=2.3.2

# The supported-platform matrix (versions, JDKs, CI lanes, the OCM pin) lives
# in support-matrix.json at the repo root — THE single source of truth. There
# is deliberately no version list here anymore.
