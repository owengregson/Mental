org.gradle.parallel=true
org.gradle.caching=true
org.gradle.jvmargs=-Xmx2g

# THE version — the single source of truth. The root build reads it into every
# module; core's processResources expands it into plugin.yml, from which both
# Mental.version() (getDescription().getVersion()) and bStats read. 5.0.0
# supersedes the legacy v4.0.1 with no numeric downgrade — and 5 > 4 sorts
# naturally, so the release changelog needs no legacy-tag special-casing.
version=5.0.0

# The supported-platform matrix (versions, JDKs, CI lanes, the OCM pin) lives
# in support-matrix.json at the repo root — THE single source of truth. There
# is deliberately no version list here anymore.
