# 2.5.1 is the 2.5.0 re-cut. The owner ordered the original 2.5.0 release
# replaced with a build carrying the post-release fixes, but GitHub's
# immutable-releases protection permanently reserves a once-published tag name
# (pre-receive rejects any recreation of v2.5.0 — by design, so a published
# version can never point at different bytes). Same intent, next patch number:
# everything 2.5.0 shipped PLUS the empirical-round fixes — the mid-sprint
# wire-seed hole closed (reconcile's seed adopts clientSprinting from the
# server flag, so a mid-play reload never latches a sprinting player to plain
# knockback), the PLAYER_INPUT (0x40) sprint-key corroborator widening the two
# SWORD_BLOCKING gates behind a 20-tick recent-sprint guard, the corrected
# skill contracts (a spoofed key-holder's un-sprint is wire-silent), the
# 1.21.11 empirical sprint-wire extraction doc, and the CI/build overhaul
# (ci-ok gate, branch protection, CodeQL/Scorecard/Dependabot, packetevents
# 2.13.0 with referrer-scoped jdk8-gate allows, Gradle 9.6.1, JUnit 6.1.1).
# Above all: the sprint ENGAGEMENT contract — one engagement, one sprint
# knock. 2.5.0's post-clear re-arm re-granted the bonus one tick after every
# hit whenever the raw client flag survived, so holding W comboed forever with
# zero reset skill (the owner ruled it a bug). The re-arm branch is deleted,
# the reconcile adopt is latch-blocked from resurrecting a spent engagement
# off the stale-high server flag (a held-W modern client's flag never drops —
# vanilla's clear lives inside the cancelled ATTACK), and a sprint knock now
# takes a client-expressed re-gesture: a wire STOP→START (w-tap, s-tap, GUI
# open) or the sword-block re-arm. That is the measured real-1.8.9 server
# contract (no-w-tap doubles flew 7.2 blocks, w-tap doubles 11.4). Also the
# scorecard-action full-tag pin (OSSF publishes no @v2 floating major tag).
# Hyphenless: publishes a stable release and moves "latest" here.
