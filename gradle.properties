# 2.7.1-beta is a two-fix round. (A) Sword-block hurt sound: while blocking, the
# victim's own hurt SOUND went silent though the flinch still played. Vanilla's
# blocked branch leaves the victim silent (its client derives its hurt sound from
# the damage-event packet, which the native block skips), so KnockbackUnit already
# replays entity.player.hurt to the victim — but that replay was a plain playSound,
# and the Combat-Effects HurtSoundSuppressor (armed for the same hit to eat the
# vanilla BYSTANDER broadcast) swallowed it too. Fix: the replay is now SILENT-
# written through the BurstSender, so it bypasses Mental's own suppressor entirely
# — exactly how HitFeedbackListener silent-writes its own replacement — leaving the
# suppressor to eat only the vanilla bystander broadcast (which never reaches the
# victim anyway). (B) The crit
# damage-indicator margin is now a PERCENT of the victim's max health, not an
# absolute crit-threshold-hearts: crit-threshold-percent (default 25) fires the
# crit marker on a critical hit OR a hit ≥ that share of total health, scaling with
# a scaled-max-health victim. The retired hearts key converts (× 10) with one warn
# (the low-health-threshold precedent); the superseded 2.7.0 signature.yml is
# hash-archived so pristine installs upgrade in place. Hyphenated ⇒ PRE-release.
