#
# StrikeSync intercepts player attack packets on a PacketEvents netty
# event-loop thread. With the fast path enabled (default), the plugin owns
# the hit pipeline end-to-end: cancellable async event hook, rate limiting,
# and damage application via the entity scheduler. The optional async
# velocity pre-send delivers the headline latency win by shipping a
# WrapperPlayServerEntityVelocity packet directly from the netty thread,
# skipping the usual next-tick + entity-tracker delay.

async-hitreg:
    # Master switch for the async hit-registration listener.
    enabled: true

    # Maximum sustained clicks-per-second per player. Excess attack packets
    # are dropped at the network level. Set 0 to disable the cap.
    max-cps: 20

    fast-path:
        # When true, the async listener cancels the original attack packet
        # and runs the hit through the plugin's own pipeline. Vanilla never
        # invokes Player#attack; instead StrikeSync calls
        # `victim.damage(amount, attacker)` on the target's owning thread,
        # which still drives every Bukkit event chain (EntityDamageByEntityEvent,
        # PlayerVelocityEvent, hurt sound + animation), but skips vanilla's
        # main-thread re-validation.
        #
        # When false, the listener degrades to a passive observer: validates,
        # fires AsyncHitRegisterEvent, but lets vanilla apply the hit.
        # Use false if a downstream plugin is incompatible with the fast path.
        enabled: true

        # When true (and fast-path is on), the async listener computes the
        # knockback vector from the per-tick player state cache and ships
        # BOTH the velocity packet and the hurt-animation packet directly
        # from the netty thread, before main-thread damage runs.
        #
        # Specifically:
        #   - WrapperPlayServerEntityVelocity → sent to the victim
        #   - WrapperPlayServerHurtAnimation  → sent to victim + attacker
        #
        # This is the headline latency win. Vanilla bundles both to the next
        # entity-tracker pulse (default: every 2 ticks for players), so a
        # victim normally sees their knockback and the red-flash/screen-shake
        # ~50–100 ms after the click hits the server. Pre-sending shaves that
        # to ~RTT.
        #
        # Caveat: the async vector is computed from tick-stale state (≤ 50 ms
        # old). When the main-thread vanilla path then computes its own
        # knockback, the entity tracker emits a second velocity packet on
        # the next tick. If the two values match (the common case), the
        # second packet is a visual no-op. If they diverge (rare; happens
        # mostly when latency compensation kicks in late), the client sees
        # a small corrective movement.
        #
        # On by default — this is StrikeSync's headline feature. Set to
        # false on servers with heavy region / safezone plugins that
        # frequently cancel EntityDamageByEntityEvent on the main thread
        # (the pre-sent feedback would already be on the wire).
        #
        # Note: the legacy key `pre-send-velocity` is still read as a
        # fallback for one release — `pre-send-feedback` takes precedence.
        pre-send-feedback: true

        # When true, the fast-path damage applier multiplies damage by 1.5
        # if the attacker satisfies the 1.8 critical-hit conditions
        # (falling, not sprinting, not in water, not blind, not in a vehicle,
        # not in creative).
        simulate-crits: true

        # When true, the fast-path damage applier resets the attacker's
        # attack-cooldown attribute after a successful hit, replicating the
        # final step of vanilla Player#attack. Set false to leave whatever
        # cooldown state the player had — useful for 1.8-pure servers that
        # want NO cooldown behavior anywhere.
        reset-attack-cooldown: true

knockback:
    # Master switch for the knockback module. Note: the module computes
    # custom knockback synchronously on the main thread — see
    # KnockbackModule.java for why "async knockback" is unsafe.
    enabled: true

    base:
        horizontal: 0.4   # Base horizontal knockback magnitude.
        vertical:   0.4   # Base vertical bump on hit.
    extra:
        horizontal: 0.5   # Per-level multiplier for sprint + Knockback enchant.
        vertical:   0.1   # Vertical bonus when extras apply.
    limits:
        vertical:    0.4  # Max Y velocity. Set <= 0 to disable.
        horizontal: -1    # Max horizontal velocity. Set <= 0 to disable.
    friction:
        x: 0.5            # How much of the victim's pre-hit X velocity is retained.
        y: 0.5
        z: 0.5
    modifiers:
        sprint: 1.0              # Extra-knockback level added when attacker is sprinting.
        armor-resistance: false  # Honor the victim's KNOCKBACK_RESISTANCE attribute.

compensation:
    # Master switch for latency compensation. When enabled, RTT is measured
    # via KEEP_ALIVE probes for combat-tagged players, the client's vertical
    # state at hit time is predicted, and a corrected victim-Y is supplied
    # to the knockback engine BEFORE the engine runs the 1.8 formula.
    #
    # Compensation never overwrites the engine's output; it only corrects
    # the input, so the configured 1.8 feel is preserved 1:1.
    enabled: true

    # Hard offset subtracted from measured RTT before computing compensation
    # ticks. KnockbackSync's tournament-tested default is 25 ms.
    ping-offset-ms: 25

    # If (current ping − previous ping) exceeds this, the previous reading
    # is used. Stops one-shot lag spikes from poisoning the calculation.
    spike-threshold-ms: 20

    # How often to send a ping probe to combat-tagged players, in ticks.
    probe-interval-ticks: 5

    # How long after the last hit a player remains "in combat" (and gets
    # fast-cadence pings), in ticks.
    combat-timeout-ticks: 30

    # Experimental: when the client thinks the victim is airborne, simulate
    # forward in time from the server's last-known vy and use that as the
    # engine override. Heuristic — disable if odd mid-air bumps appear.
    off-ground-sync: true

debug:
    # Verbose logs to the server console (and nowhere else).
    enabled: false

# -----------------------------------------------------------------
# Knockback math (in order of evaluation):
#
#  1. Direction = (attacker.x − victim.x, ·, attacker.z − victim.z),
#     normalized. If attacker and victim share a horizontal position,
#     a tiny random direction is picked so knockback never zeroes out.
#
#  2. Base velocity:
#       xVel = victim.vx · friction.x − dx/|d| · base.horizontal
#       yVel = victim.vy · friction.y + base.vertical
#       zVel = victim.vz · friction.z − dz/|d| · base.horizontal
#
#  3. Horizontal cap (limits.horizontal > 0): rescale (x, z) so
#     sqrt(x² + z²) ≤ limits.horizontal.
#
#  4. Sprint + Knockback enchant bonus:
#       level   = (sprinting ? modifiers.sprint : 0) + enchantLevel
#       xVel  += −sin(yaw) · level · extra.horizontal
#       zVel  += +cos(yaw) · level · extra.horizontal
#       yVel  += extra.vertical
#
#  5. Vertical cap (limits.vertical > 0): yVel = min(yVel, limits.vertical).
#     Applied AFTER extras so the cap holds even with bonuses.
#
#  6. Armor knockback resistance (modifiers.armor-resistance):
#       horizontal *= (1 − victim.knockbackResistance)
# -----------------------------------------------------------------
