# Dependabot — gradle (reads gradle/libs.versions.toml + the build scripts)
# and github-actions, weekly. Routine minor/patch bumps arrive grouped into a
# single PR per ecosystem; majors stay individual so each gets its own gate
# run (every bump PR runs ./gradlew build, i.e. unit tests + japicmp + the
# four mega-jar verification gates, plus the ci:"pr" integration lanes).
#
# Deliberately ignored — load-bearing pins that must never be auto-bumped:
#   * xyz.wagyourtail* (JVMDowngrader): pinned 1.3.6. The Multi-Release
#     mega-jar depends on version-verified downgrade behavior (-mro semantics,
#     the record-toString regression history); a bump is a manual, gate-proven
#     decision. See gradle/libs.versions.toml.
#   * net.kyori:* (Adventure): pinned 4.9.3 = the version Paper's 1.17.1
#     floor API declares, so the compile classpath stays single-versioned and
#     the shaded copy is API-identical to what core compiles against.
#   * io.papermc.paper:paper-api: the three catalog entries are deliberate
#     compile-API levels (floor / Folia / modern), never "latest wins" — the
#     runtime versions live in support-matrix.json.
version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      gradle-minor-patch:
        applies-to: version-updates
        update-types: [minor, patch]
    ignore:
      - dependency-name: "xyz.wagyourtail*"
      - dependency-name: "net.kyori:*"
      - dependency-name: "io.papermc.paper:paper-api"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"
