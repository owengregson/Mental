# CodeQL static analysis — the ADVANCED setup; GitHub's default setup is
# deliberately disabled (the two are mutually exclusive: default setup rejects
# SARIF from workflow-based analyses). Coverage matches what default setup
# scanned, minus its noise: java-kotlin for the plugin, javascript-typescript
# for the project/legacy-lab harness scripts, actions for the workflows themselves.
#
# build-mode: none scans sources without invoking Gradle at all — the right
# choice here, because a full build would drag the whole mega-jar pipeline
# (shadow → jvmdg → shade → four verification gates) plus foojay JDK downloads
# into every scan for zero analysis benefit. Results land in Security → Code
# scanning.
#
# PR runs are path-filtered to files the analyzers can actually see (a docs
# PR has nothing to scan); pushes to main keep the code-scanning baseline
# fresh so PR alerts diff against current main; the weekly schedule picks up
# newly-published queries against unchanged code. Query suite: the default
# (precision over breadth) — flip `queries: security-extended` in the init
# step to widen it.
name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - '**/*.java'
      - '**/*.js'
      - '**/*.ts'
      - '**/*.gradle.kts'
      - 'gradle/**'
      - '.github/workflows/**'
  schedule:
    - cron: '24 4 * * 1' # Mondays 04:24 UTC — off the top-of-hour rush

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write # upload code-scanning results
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [java-kotlin, javascript-typescript, actions]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Analyze
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: '/language:${{ matrix.language }}'
