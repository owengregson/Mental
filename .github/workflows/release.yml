name: release

# Triggered by pushing a semver tag like `v1.0.0`. Builds on a clean runner,
# runs the full integration matrix against real Paper servers, and publishes
# a GitHub Release with the jar attached.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDKs (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: |
            17
            25
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and unit test
        run: ./gradlew build

      - name: Full integration matrix
        run: ./gradlew integrationTestMatrix

      - name: Locate jar
        id: jar
        run: |
          jar=$(ls core/build/libs/Mental-*.jar | head -n1)
          echo "path=$jar" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$jar")" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          {
            echo 'notes<<EOF'
            echo "## Mental ${{ steps.tag.outputs.name }}"
            echo
            echo '**Supports:** Paper 1.17.1 → 26.1.2, Folia. **Requires:** Java 17+. No plugin dependencies.'
            echo
            echo 'Verified by booting real Paper servers across the full version matrix.'
            echo
            echo '### Install'
            echo
            echo "1. Drop \`${{ steps.jar.outputs.name }}\` into your server's \`plugins/\` directory."
            echo '2. Start the server. Default config is generated under `plugins/Mental/config.yml`.'
            echo
            echo '### Verify'
            echo
            echo '```'
            echo 'sha256sum '${{ steps.jar.outputs.name }}
            echo '```'
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Mental ${{ steps.tag.outputs.name }}
          body: ${{ steps.notes.outputs.notes }}
          files: ${{ steps.jar.outputs.path }}
          fail_on_unmatched_files: true
          generate_release_notes: true
