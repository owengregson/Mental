name: release

# Triggered by pushing a semver tag like `v3.0.0`. The workflow builds the
# project on a clean runner and creates a GitHub Release with the produced
# jar attached as a downloadable asset.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v3.0.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: mvn -B -ntp clean package

      - name: Locate jar
        id: jar
        run: |
          jar=$(ls target/StrikeSync-*.jar | grep -v 'original-' | head -n1)
          echo "path=$jar" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$jar")" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          {
            echo 'notes<<EOF'
            echo "## StrikeSync ${{ steps.tag.outputs.name }}"
            echo
            echo '**Build:** Java 21, Paper 26.1.2, PacketEvents 2.12.1.'
            echo
            echo '### Install'
            echo
            echo '1. Install [PacketEvents](https://modrinth.com/plugin/packetevents) (required dependency).'
            echo "2. Drop \`${{ steps.jar.outputs.name }}\` into your server's \`plugins/\` directory."
            echo '3. Start the server. Default config is generated under `plugins/StrikeSync/config.yml`.'
            echo
            echo '### Verify'
            echo
            echo '```'
            echo 'sha256sum '${{ steps.jar.outputs.name }}
            echo '```'
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: StrikeSync ${{ steps.tag.outputs.name }}
          body: ${{ steps.notes.outputs.notes }}
          files: ${{ steps.jar.outputs.path }}
          fail_on_unmatched_files: true
          generate_release_notes: true
