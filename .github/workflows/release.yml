name: auto-release

# The auto-releaser. Every push to main answers three questions:
#
#   1. Has the version in build.gradle.kts been bumped past the last
#      release? (No tag v<version> yet.)
#   2. Do the unit tests pass?
#   3. Does the FULL integration matrix pass — every supported Paper
#      version booted for real, in parallel across runners?
#
# Only when all three hold does it build the jar, tag v<version> at the
# verified commit, and publish a GitHub Release whose notes are install
# instructions plus a collapsed changelog of every commit since the last
# release. No version bump → the run ends at the detect job in seconds.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Read-only by default; only the release job (which tags and publishes) gets
# contents: write — least privilege, and what OSSF Scorecard's Token-Permissions
# check expects.
permissions:
  contents: read

# One release pipeline at a time; a queued run re-evaluates the version
# after the previous one finishes, so the same version can never double-tag.
concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.facts.outputs.version }}
      tag: ${{ steps.facts.outputs.tag }}
      previous_tag: ${{ steps.facts.outputs.previous_tag }}
      prerelease: ${{ steps.facts.outputs.prerelease }}
      should_release: ${{ steps.facts.outputs.should_release }}
      matrix: ${{ steps.facts.outputs.matrix }}
      build_jdk: ${{ steps.facts.outputs.build_jdk }}

    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Read version, last release, and the test matrix
        id: facts
        run: |
          version=$(grep -m1 -E '^version=' gradle.properties | sed -E 's/^version=//')
          tag="v$version"

          # The changelog baseline: the nearest release tag in THIS commit's
          # ancestry. Version sort would be wrong here — the legacy StrikeSync
          # v4.x tags live in the same history and sort above Mental's 2.x
          # line, but they were not the previous release of anything.
          previous_tag=$(git describe --tags --abbrev=0 --exclude="$tag" HEAD 2>/dev/null || true)

          # A hyphenated version (2.3.0-beta) publishes as a GitHub
          # pre-release and never takes the "latest" marker.
          case "$version" in
            *-*) prerelease=true ;;
            *)   prerelease=false ;;
          esac

          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            should_release=false
            echo "Version $version is already released as $tag — nothing to do."
          else
            should_release=true
            echo "Version $version is unreleased (last release: ${previous_tag:-none}) — releasing."
          fi

          # The full integration matrix (every paper entry) comes from
          # support-matrix.json — the same single source of truth the build,
          # the local script, and the PR workflow read.
          matrix=$(jq -c '[.entries[] | select(.platform=="paper") | .version]' support-matrix.json)

          {
            echo "version=$version"
            echo "tag=$tag"
            echo "previous_tag=$previous_tag"
            echo "prerelease=$prerelease"
            echo "should_release=$should_release"
            echo "matrix=$matrix"
          } >> "$GITHUB_OUTPUT"

          # The BUILD JDK = the NEWEST JDK the matrix targets (jq max).
          # setup-java installs ONLY this one; every OTHER JDK — 8 for the
          # verifyJdk8Api baseline, 13/14/16/17/21 for the legacy servers — is
          # auto-provisioned on demand by the Gradle foojay toolchain resolver,
          # exactly as it is locally. (Temurin does not even publish 13/14/16,
          # so installing the full matrix set here is both unnecessary and
          # impossible.) No JDK literal lives in this workflow — support-matrix.json
          # is the only home.
          echo "build_jdk=$(jq '[.entries[].jdk] | max' support-matrix.json)" >> "$GITHUB_OUTPUT"

  unit:
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up the build JDK (Temurin)
        uses: actions/setup-java@v5
        with:
          # Only the build JDK (the newest matrix JDK, jq max in detect); the
          # Gradle foojay toolchain auto-provisions JDK 8 for verifyJdk8Api.
          java-version: ${{ needs.detect.outputs.build_jdk }}
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # Cache the foojay-provisioned toolchain JDKs (e.g. the JDK 8 verifyJdk8Api
      # resolves) so they are not re-downloaded every run. gradle/actions caches
      # ~/.gradle/caches, not ~/.gradle/jdks.
      - name: Cache foojay-provisioned JDKs
        uses: actions/cache@v6
        with:
          path: ~/.gradle/jdks
          key: gradle-jdks-${{ runner.os }}-${{ hashFiles('support-matrix.json') }}
          restore-keys: |
            gradle-jdks-${{ runner.os }}-

      - name: Build and unit test
        run: ./gradlew build

  integration:
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        version: ${{ fromJSON(needs.detect.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up the build JDK (Temurin)
        uses: actions/setup-java@v5
        with:
          # Only the build JDK (the newest matrix JDK, jq max in detect); the
          # Gradle foojay toolchain auto-provisions this entry's server JDK.
          java-version: ${{ needs.detect.outputs.build_jdk }}
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # The expensive part of booting a version is downloading paperclip and
      # patching the server. Restore the newest cache for this version and
      # save an updated one every run (the run_id key never pre-exists, so
      # new Paper builds keep flowing into the cache). ~/.gradle/jdks rides
      # along so this entry's foojay-provisioned server JDK is cached too.
      - name: Cache the Paper server runtime
        uses: actions/cache@v6
        with:
          path: |
            run/${{ matrix.version }}/cache
            run/${{ matrix.version }}/versions
            run/${{ matrix.version }}/libraries
            run/${{ matrix.version }}/world*
            ~/.gradle/caches/run-task-jars
            ~/.gradle/jdks
          key: paper-runtime-${{ matrix.version }}-${{ github.run_id }}
          restore-keys: |
            paper-runtime-${{ matrix.version }}-

      - name: Run integration suite on Paper ${{ matrix.version }}
        run: ./gradlew "checkIntegrationTest_${MATRIX_VERSION//./_}"
        env:
          MATRIX_VERSION: ${{ matrix.version }}

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-integration-log-${{ matrix.version }}
          path: core/build/integration-test-logs/${{ matrix.version }}.log

  # The Folia gate — release-only (ci: "release" in support-matrix.json). Boots
  # a real Folia server (fetched from the Folia project on the PaperMC API by the
  # RunServer's Folia downloads service) with Mental + the tester, which
  # runtime-detects Folia and runs the boot suite + the Folia combat smoke (a
  # same-region fake pair driven on their owning region threads, journal-asserted
  # — the first live combat coverage Mental has on Folia; Task 5.6). Release-only
  # on purpose: an extra real server per PR is too costly, and Folia's own runtime
  # (26.x) requires JDK 25.
  folia:
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up the build JDK (Temurin)
        uses: actions/setup-java@v5
        with:
          # Only the build JDK (the newest matrix JDK, jq max in detect); the
          # Gradle foojay toolchain auto-provisions the Folia server JDK.
          java-version: ${{ needs.detect.outputs.build_jdk }}
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Cache foojay-provisioned JDKs
        uses: actions/cache@v6
        with:
          path: ~/.gradle/jdks
          key: gradle-jdks-${{ runner.os }}-${{ hashFiles('support-matrix.json') }}
          restore-keys: |
            gradle-jdks-${{ runner.os }}-

      - name: Run the Folia integration entries
        run: ./gradlew integrationTestFolia

      - name: Upload Folia server logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-folia-logs
          path: core/build/integration-test-logs/folia-*.log

  release:
    needs: [detect, unit, integration, folia]
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # tags v<version> and publishes the GitHub Release

    steps:
      - name: Checkout (full history + tags for the changelog)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up the build JDK (Temurin)
        uses: actions/setup-java@v5
        with:
          # Only the build JDK (the newest matrix JDK, jq max in detect); the
          # Gradle foojay toolchain auto-provisions JDK 8 for verifyJdk8Api.
          java-version: ${{ needs.detect.outputs.build_jdk }}
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Cache foojay-provisioned JDKs
        uses: actions/cache@v6
        with:
          path: ~/.gradle/jdks
          key: gradle-jdks-${{ runner.os }}-${{ hashFiles('support-matrix.json') }}
          restore-keys: |
            gradle-jdks-${{ runner.os }}-

      - name: Build the release jar
        run: ./gradlew build

      - name: Locate jar
        id: jar
        run: |
          jar=$(ls core/build/libs/Mental-*.jar | head -n1)
          echo "path=$jar" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$jar")" >> "$GITHUB_OUTPUT"

      # The public api artifact (me.vexmc:mental-api) rides along with every
      # release so integrators can grab the exact surface this build ships. The
      # release build already produced api/build/libs/api-<pluginVersion>.jar;
      # withSourcesJar() also emits an api-<pluginVersion>-sources.jar, so filter
      # the -sources classifier out and fail LOUDLY unless exactly one binary jar
      # remains. Rename it to the api's OWN publication semver (apiVersion,
      # independent of the plugin version) so the asset reads mental-api-3.0.0.jar.
      - name: Locate and name the api jar
        id: apijar
        run: |
          shopt -s nullglob
          mains=()
          for j in api/build/libs/api-*.jar; do
            case "$j" in
              *-sources.jar) ;;
              *) mains+=("$j") ;;
            esac
          done
          if [ "${#mains[@]}" -ne 1 ]; then
            echo "::error::expected exactly one api binary jar in api/build/libs, found ${#mains[@]}: ${mains[*]:-none}"
            exit 1
          fi
          api_version=$(grep -m1 -E '^apiVersion=' gradle.properties | sed -E 's/^apiVersion=//')
          dest="mental-api-${api_version}.jar"
          cp "${mains[0]}" "$dest"
          echo "Named ${mains[0]} → $dest"
          echo "path=$dest" >> "$GITHUB_OUTPUT"
          echo "name=$dest" >> "$GITHUB_OUTPUT"

      - name: Compose release notes
        env:
          TAG: ${{ needs.detect.outputs.tag }}
          PREVIOUS_TAG: ${{ needs.detect.outputs.previous_tag }}
          JAR_NAME: ${{ steps.jar.outputs.name }}
        run: |
          if [ -n "$PREVIOUS_TAG" ]; then
            range="$PREVIOUS_TAG..HEAD"
            since="since $PREVIOUS_TAG"
          else
            range="HEAD"
            since="full history"
          fi
          changelog=$(git log "$range" --no-merges --pretty='- %s (`%h`)')
          count=$(printf '%s\n' "$changelog" | grep -c '^- ' || true)

          # The supported range (floor → ceiling) comes from support-matrix.json.
          support_range=$(jq -r '[.entries[] | select(.platform=="paper") | .version] | .[0] + " → " + .[-1]' support-matrix.json)

          {
            echo "**Supports** Paper $support_range · Folia — **one jar**, no plugin dependencies."
            echo
            echo "> **One jar, every version — no flags, no per-version builds.** Mental ships a single Multi-Release jar that classloads on **any** Java your server itself runs, from **Java 8 up**: legacy JVMs read the Java-8 bytecode tree, modern JVMs (1.17+) read the original Java-17 tree — byte-for-byte the behaviour the matrix has proven for months. Every version 1.9.4 → 26.x is covered, **1.14.4 included**."
            echo ">"
            echo "> **Recommended Java:** run the newest Java your server build accepts flagless — that is all Mental needs."
            echo
            echo "### Install"
            echo
            echo "1. Download \`$JAR_NAME\` below and drop it into your server's \`plugins/\` folder."
            echo "2. Restart the server."
            echo
            echo "That's it — the defaults are the classic combat. Configuration is generated under \`plugins/Mental/\`: \`knockback.yml\` selects the knockback profile (presets live in \`plugins/Mental/profiles/\`), and every option is documented in its file."
            echo
            echo "Upgrading from an old single-file config? It migrates automatically — tuned knockback values become \`profiles/custom.yml\` (and stay selected), and the original is kept as \`config-v1-backup.yml\`."
            echo
            echo "<details>"
            echo "<summary>Changelog — $count commits $since</summary>"
            echo
            echo "$changelog"
            echo
            echo "</details>"
            echo
            echo "---"
            echo "_Released automatically after unit tests and the full ${{ join(fromJSON(needs.detect.outputs.matrix), ', ') }} integration matrix passed on real Paper servers._"
          } > release-notes.md

          echo "── release-notes.md ──"
          cat release-notes.md

      # Create as a DRAFT first: with immutable releases enabled, GitHub
      # freezes a release the moment it is published, so the asset upload
      # that follows creation is rejected on a non-draft release (the
      # v2.5.3-beta failure). A draft accepts the jar, and the publish
      # step below flips it live with the asset already attached.
      - name: Tag the release as a draft with the jar attached
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.detect.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Mental ${{ needs.detect.outputs.tag }}
          body_path: release-notes.md
          files: |
            ${{ steps.jar.outputs.path }}
            ${{ steps.apijar.outputs.path }}
          fail_on_unmatched_files: true
          draft: true
          prerelease: ${{ needs.detect.outputs.prerelease == 'true' }}

      - name: Publish the draft (immutability locks in WITH the asset)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.detect.outputs.tag }}
        run: |
          if [ "${{ needs.detect.outputs.prerelease }}" = "true" ]; then
            gh release edit "$TAG" --draft=false
          else
            gh release edit "$TAG" --draft=false --latest
          fi
