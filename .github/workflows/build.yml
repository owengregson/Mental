name: build

on:
  push:
    branches: ['**']
    tags-ignore: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Derive the build JDK from support-matrix.json
        id: jdk
        run: |
          # The BUILD JDK = the NEWEST JDK the matrix targets (jq max). setup-java
          # installs ONLY this one; the Gradle foojay toolchain auto-provisions
          # JDK 8 (verifyJdk8Api) on demand, exactly as locally. Temurin does not
          # publish 13/14/16, so installing the full matrix set is impossible
          # anyway. No JDK literal lives in this workflow (support-matrix.json is
          # the only home). The compile floor keeps the jar loadable on the oldest.
          echo "build=$(jq '[.entries[].jdk] | max' support-matrix.json)" >> "$GITHUB_OUTPUT"

      - name: Set up the build JDK (Temurin)
        uses: actions/setup-java@v5
        with:
          java-version: ${{ steps.jdk.outputs.build }}
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      # Cache the foojay-provisioned toolchain JDKs (e.g. the JDK 8 verifyJdk8Api
      # resolves) so they are not re-downloaded every run. gradle/actions caches
      # ~/.gradle/caches, not ~/.gradle/jdks.
      - name: Cache foojay-provisioned JDKs
        uses: actions/cache@v5
        with:
          path: ~/.gradle/jdks
          key: gradle-jdks-${{ runner.os }}-${{ hashFiles('support-matrix.json') }}
          restore-keys: |
            gradle-jdks-${{ runner.os }}-

      - name: Build and unit test
        run: ./gradlew build

      - name: Upload jar
        uses: actions/upload-artifact@v5
        with:
          name: Mental
          path: core/build/libs/Mental-*.jar

  # The PR integration sample — the entries flagged ci: "pr" in
  # support-matrix.json (floor, the Folia-era midpoint, a recent release, the
  # ceiling). The full matrix (every paper entry) runs before a release via
  # the auto-release workflow.
  matrix:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.read.outputs.versions }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Read the PR matrix from support-matrix.json
        id: read
        run: |
          versions=$(jq -c '[.entries[] | select(.platform=="paper" and .ci=="pr") | .version]' support-matrix.json)
          echo "versions=$versions" >> "$GITHUB_OUTPUT"

  integration:
    needs: [build, matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        # Each matrix job is its own VM, so they run fully in parallel. The
        # per-version JDK is foojay-auto-provisioned by Gradle from
        # support-matrix.json; only the build JDK is installed below.
        version: ${{ fromJSON(needs.matrix.outputs.versions) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Derive the build JDK from support-matrix.json
        id: jdk
        run: |
          # Install ONLY the build JDK (the newest matrix JDK, jq max); the Gradle
          # foojay toolchain auto-provisions this entry's server JDK on demand,
          # exactly as locally. No JDK literal here (support-matrix.json is the
          # only home).
          echo "build=$(jq '[.entries[].jdk] | max' support-matrix.json)" >> "$GITHUB_OUTPUT"

      - name: Set up the build JDK (Temurin)
        uses: actions/setup-java@v5
        with:
          java-version: ${{ steps.jdk.outputs.build }}
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      # The expensive part of booting a version is downloading paperclip and
      # patching the server. Restore the newest cache for this version and
      # save an updated one every run (the run_id key never pre-exists, so
      # new Paper builds keep flowing into the cache). ~/.gradle/jdks rides
      # along so this entry's foojay-provisioned server JDK is cached too.
      - name: Cache the Paper server runtime
        uses: actions/cache@v5
        with:
          path: |
            run/${{ matrix.version }}/cache
            run/${{ matrix.version }}/versions
            run/${{ matrix.version }}/libraries
            run/${{ matrix.version }}/world*
            ~/.gradle/caches/run-task-jars
            ~/.gradle/jdks
          key: paper-runtime-${{ matrix.version }}-${{ github.run_id }}
          restore-keys: |
            paper-runtime-${{ matrix.version }}-

      - name: Run integration suite on Paper ${{ matrix.version }}
        run: ./gradlew "checkIntegrationTest_${MATRIX_VERSION//./_}"
        env:
          MATRIX_VERSION: ${{ matrix.version }}

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: integration-log-${{ matrix.version }}
          path: core/build/integration-test-logs/${{ matrix.version }}.log
