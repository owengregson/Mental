# The PR/branch validation pipeline. It picks its work intelligently:
#
#   - main is NOT built here — every push to main is owned by the release
#     pipeline (release.yml), which runs the FULL 15-entry paper matrix + the
#     Folia gate before tagging. Running build+integration here too was pure
#     duplication (the same servers booted twice per merge).
#   - The `context` job classifies the branch's diff against main and sizes
#     the integration fan-out to the risk:
#         docs-only  → nothing boots (no Gradle at all);
#         code       → the representative `ci: "pr"` lanes from
#                      support-matrix.json (floor, a v52-tier mid legacy,
#                      modern floor, recent, ceiling);
#         toolchain  → the full paper fan-out (a build/matrix/workflow change
#                      can break any entry, so every entry must prove itself).
#     The Folia entry stays release-only on purpose: an extra real server per
#     PR is too costly (see .claude/skills/matrix-gate).
#   - A push to a branch that already has an open PR DEFERS to the
#     pull_request run of the same commit (it tests the merge result, which
#     is strictly more informative than the branch tip) — and a deferred run
#     renders NO verdict: its fan-in job skips, and only pull_request runs
#     carry the required ci-ok name at all (other events report ci-checks).
#
# `ci-ok` is the single fan-in gate branch protection requires: it fails iff
# any needed job failed, and reads success when jobs were legitimately skipped
# (a docs-only PR must stay mergeable). The nonce/per-entry-JDK model of the
# integration gate itself is untouched — see .claude/skills/matrix-gate.
name: build

on:
  push:
    branches-ignore:
      - main            # owned by release.yml (full matrix + Folia before tagging)
      - 'dependabot/**' # dependabot branches get CI via their pull_request runs only
    tags-ignore: ['v*']
  pull_request:
  workflow_dispatch:
    inputs:
      lanes:
        description: 'Integration lane set to run'
        type: choice
        options: [pr, full, none]
        default: pr

permissions:
  contents: read

# One live run per ref; a superseded commit cancels its predecessor's run.
# push and pull_request runs of the same branch land in different groups
# (github.ref differs), so they never cancel each other — the context job's
# open-PR check is what de-duplicates those.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Decides what this run must do. Everything downstream keys off its outputs,
  # so the classification logic lives in exactly one place.
  context:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # the open-PR duplicate check below
    outputs:
      run_build: ${{ steps.decide.outputs.run_build }}
      versions: ${{ steps.decide.outputs.versions }}
      build_jdk: ${{ steps.decide.outputs.build_jdk }}
      # 'true' when this push run deferred to the open PR's run of the same
      # commit. Distinct from a docs-only skip on purpose: deferring means this
      # run renders NO verdict (the fan-in must not report), while docs-only
      # means "no lanes needed" IS the verdict.
      deferred: ${{ steps.decide.outputs.deferred }}
    steps:
      - name: Checkout (full history — the diff below is against main's merge-base)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Classify the change and size the integration fan-out
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT: ${{ github.event_name }}
          BRANCH: ${{ github.ref_name }}
          DISPATCH_LANES: ${{ inputs.lanes }}
        run: |
          # The BUILD JDK = the NEWEST JDK the matrix targets (jq max). setup-java
          # installs ONLY this one; the Gradle foojay toolchain auto-provisions
          # every other JDK (8 for verifyJdk8Api, the per-entry server JDKs) on
          # demand, exactly as locally. No JDK literal lives in this workflow —
          # support-matrix.json is the only home.
          echo "build_jdk=$(jq '[.entries[].jdk] | max' support-matrix.json)" >> "$GITHUB_OUTPUT"
          echo "deferred=false" >> "$GITHUB_OUTPUT"

          # A push to a branch with an open PR duplicates that PR's own run of
          # the same commit — DEFER to it (the PR run tests the merge result,
          # which is the stronger check). Deferring is not a verdict: the
          # fan-in job skips on this flag, so this run can never satisfy the
          # required ci-ok check while the PR run is still deciding (that
          # vacuous pass auto-merged PR #34 before its lanes had run).
          if [ "$EVENT" = "push" ] && [ -n "$(gh pr list --head "$BRANCH" --state open --json number --jq '.[].number')" ]; then
            echo "Push to '$BRANCH' duplicates its open PR's run — deferring, no verdict from this run."
            { echo "deferred=true"; echo "run_build=false"; echo "versions=[]"; } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pr_lanes=$(jq -c '[.entries[] | select(.platform=="paper" and .ci=="pr") | .version]' support-matrix.json)
          all_lanes=$(jq -c '[.entries[] | select(.platform=="paper") | .version]' support-matrix.json)

          # A manual dispatch says explicitly what it wants; no diff heuristics.
          if [ "$EVENT" = "workflow_dispatch" ]; then
            case "$DISPATCH_LANES" in
              full) versions=$all_lanes ;;
              none) versions='[]' ;;
              *)    versions=$pr_lanes ;;
            esac
            { echo "run_build=true"; echo "versions=$versions"; } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # The branch's whole delta vs main (merge-base diff), not just the
          # pushed commits — the total delta is what decides how much testing
          # the branch needs.
          changed=$(git diff --name-only origin/main...HEAD)
          echo "Changed files:"; printf '%s\n' "$changed" | sed 's/^/  /'

          # Classification, safest-first: any toolchain file → full fan-out;
          # otherwise anything NOT on the docs allowlist → code (unknown paths
          # deliberately fall through to code, never to docs); all-docs → skip.
          toolchain_re='(^|/)[^/]*\.gradle\.kts$|^gradle/|^gradle\.properties$|^gradlew|^support-matrix\.json$|^scripts/|^\.github/workflows/'
          docs_re='^(docs/|\.claude/|legacy-lab/|\.github/dependabot\.yml$|LICENSE$|\.gitignore$)|\.md$'

          if printf '%s\n' "$changed" | grep -qE "$toolchain_re"; then
            klass=toolchain; versions=$all_lanes
          elif [ -n "$changed" ] && ! printf '%s\n' "$changed" | grep -qvE "$docs_re"; then
            klass=docs; versions='[]'
          else
            klass=code; versions=$pr_lanes
          fi
          echo "Change class: $klass → lanes $versions"

          if [ "$klass" = "docs" ]; then
            { echo "run_build=false"; echo "versions=[]"; } >> "$GITHUB_OUTPUT"
          else
            { echo "run_build=true"; echo "versions=$versions"; } >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: context
    if: needs.context.outputs.run_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up the build JDK (Temurin)
        uses: actions/setup-java@v5
        with:
          java-version: ${{ needs.context.outputs.build_jdk }}
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # Cache the foojay-provisioned toolchain JDKs (e.g. the JDK 8 verifyJdk8Api
      # resolves) so they are not re-downloaded every run. gradle/actions caches
      # ~/.gradle/caches, not ~/.gradle/jdks.
      - name: Cache foojay-provisioned JDKs
        uses: actions/cache@v6
        with:
          path: ~/.gradle/jdks
          key: gradle-jdks-${{ runner.os }}-${{ hashFiles('support-matrix.json') }}
          restore-keys: |
            gradle-jdks-${{ runner.os }}-

      - name: Build and unit test
        run: ./gradlew build

      - name: Upload jar
        uses: actions/upload-artifact@v7
        with:
          name: Mental
          path: core/build/libs/Mental-*.jar

  integration:
    needs: [context, build]
    if: needs.context.outputs.versions != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        # Each matrix job is its own VM, so they run fully in parallel. The
        # per-version JDK is foojay-auto-provisioned by Gradle from
        # support-matrix.json; only the build JDK is installed below.
        version: ${{ fromJSON(needs.context.outputs.versions) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up the build JDK (Temurin)
        uses: actions/setup-java@v5
        with:
          java-version: ${{ needs.context.outputs.build_jdk }}
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # The expensive part of booting a version is downloading paperclip and
      # patching the server. Restore the newest cache for this version and
      # save an updated one every run (the run_id key never pre-exists, so
      # new Paper builds keep flowing into the cache). ~/.gradle/jdks rides
      # along so this entry's foojay-provisioned server JDK is cached too.
      - name: Cache the Paper server runtime
        uses: actions/cache@v6
        with:
          path: |
            run/${{ matrix.version }}/cache
            run/${{ matrix.version }}/versions
            run/${{ matrix.version }}/libraries
            run/${{ matrix.version }}/world*
            ~/.gradle/caches/run-task-jars
            ~/.gradle/jdks
          key: paper-runtime-${{ matrix.version }}-${{ github.run_id }}
          restore-keys: |
            paper-runtime-${{ matrix.version }}-

      - name: Run integration suite on Paper ${{ matrix.version }}
        run: ./gradlew "checkIntegrationTest_${MATRIX_VERSION//./_}"
        env:
          MATRIX_VERSION: ${{ matrix.version }}

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-log-${{ matrix.version }}
          path: core/build/integration-test-logs/${{ matrix.version }}.log

  # The single stable fan-in for branch protection: required checks reference
  # the ci-ok name only, so the lane set can vary per change class (or grow
  # with support-matrix.json) without ever re-configuring protection. Skipped
  # upstream jobs are fine (a docs-only PR must merge); failed or cancelled
  # ones are not.
  #
  # Two hard rules keep this check honest (learned from PR #34, where the
  # push run's vacuous pass satisfied protection and auto-merge fired while
  # the PR run's lanes were still running):
  #   1. Only pull_request runs carry the required name — every other event
  #      reports as ci-checks, which protection ignores, so no push/dispatch
  #      run can ever satisfy (or brick) the required check regardless of how
  #      skipped conclusions are treated.
  #   2. A deferred run (push with an open PR) renders NO verdict at all:
  #      this job skips outright instead of blessing the skipped lanes.
  #      Docs-only is different — there "no lanes needed" IS the verdict, and
  #      the PR run passes it legitimately.
  ci-ok:
    name: ${{ github.event_name == 'pull_request' && 'ci-ok' || 'ci-checks' }}
    needs: [context, build, integration]
    if: ${{ !cancelled() && needs.context.outputs.deferred != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify no needed job failed
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          echo "$RESULTS" | jq -r 'to_entries[] | "\(.key): \(.value.result)"'
          if echo "$RESULTS" | jq -e '[.[].result] | any(. == "failure" or . == "cancelled")' >/dev/null; then
            echo "A required job failed or was cancelled."
            exit 1
          fi
