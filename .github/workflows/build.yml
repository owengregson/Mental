name: build

on:
  push:
    branches: ['**']
    tags-ignore: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build and unit test
        run: ./gradlew build

      - name: Upload jar
        uses: actions/upload-artifact@v5
        with:
          name: Mental
          path: core/build/libs/Mental-*.jar

  integration:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        # A deliberate sample — floor, the Folia-era midpoint, a recent
        # release, and the ceiling. Every version in gradle.properties'
        # integrationTestVersions runs before a release via the
        # auto-release workflow. Each matrix job is its own VM, so they
        # run fully in parallel.
        version: ['1.17.1', '1.20.6', '1.21.11', '26.1.2']

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDKs (Temurin)
        uses: actions/setup-java@v5
        with:
          java-version: |
            17
            25
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      # The expensive part of booting a version is downloading paperclip and
      # patching the server. Restore the newest cache for this version and
      # save an updated one every run (the run_id key never pre-exists, so
      # new Paper builds keep flowing into the cache).
      - name: Cache the Paper server runtime
        uses: actions/cache@v4
        with:
          path: |
            run/${{ matrix.version }}/cache
            run/${{ matrix.version }}/versions
            run/${{ matrix.version }}/libraries
            run/${{ matrix.version }}/world*
            ~/.gradle/caches/run-task-jars
          key: paper-runtime-${{ matrix.version }}-${{ github.run_id }}
          restore-keys: |
            paper-runtime-${{ matrix.version }}-

      - name: Run integration suite on Paper ${{ matrix.version }}
        run: ./gradlew "checkIntegrationTest_${MATRIX_VERSION//./_}"
        env:
          MATRIX_VERSION: ${{ matrix.version }}

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: integration-log-${{ matrix.version }}
          path: core/build/integration-test-logs/${{ matrix.version }}.log
