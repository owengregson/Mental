name: build

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build
        run: mvn -B -ntp clean package

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: StrikeSync-${{ github.sha }}
          path: target/StrikeSync-*.jar
          if-no-files-found: error
          retention-days: 14
