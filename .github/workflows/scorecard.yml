# OSSF Scorecard — supply-chain security posture analysis (branch protection,
# token permissions, dependency pinning, dangerous workflow patterns, …).
# Runs on pushes to main (the branch it scores) and weekly to pick up new
# checks; results land in Security → Code scanning, and publish_results feeds
# the public OpenSSF REST API / badge.
#
# Note: actions here are pinned to full commit SHAs (with the resolved
# release in a trailing comment) like the rest of this repo's workflows —
# what Scorecard's own Pinned-Dependencies check requires. Dependabot's
# github-actions ecosystem understands SHA pins and keeps both the SHA and
# the comment current in its weekly grouped PR.
name: scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: '41 5 * * 1' # Mondays 05:41 UTC
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to code scanning
      id-token: write        # publish_results verifies the workflow identity via OIDC

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      # The SARIF rides along as an artifact for offline inspection.
      - name: Upload Scorecard artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: results.sarif
