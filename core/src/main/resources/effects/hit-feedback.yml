# ──────────────────────────────────────────────────────────────────────────
#  Mental — hit feedback (Combat Effects)
#
#  Settings only: the on/off switch lives in config.yml under modules:
#  (modules.hit-feedback — default OFF; a disabled module changes nothing
#  the game does or shows). This file is yours to edit — it is extracted
#  once and never overwritten; deleting it regenerates the pristine bundle.
# ──────────────────────────────────────────────────────────────────────────

# Replaces the vanilla melee hurt-sound broadcast with your own layered sounds
# and pops particle bursts at the victim's mid-chest.
#
# Scope matches vanilla EXACTLY: the sounds and particles reach every nearby
# player EXCEPT the victim. The victim's own client derives its hurt sound from
# the damage event and keeps doing so — that is server-unreachable without
# breaking the victim's own flinch, so it is deliberately left alone.
#
# ── The preset chooses the whole tune ──────────────────────────────────────
# preset: vanilla   → audibly vanilla — the era hurt sound at the era pitch (the
#                     default; no particles). With the module enabled, this
#                     preset reproduces what vanilla broadcast anyway.
# preset: signature → Mental's own layered tune: a lodestone-break + generic-hurt
#                     + breeze-deflect chord over a redstone-block burst, plus a
#                     glow-squid low-health chirp. A sound that does not exist on
#                     an older server resolves to an era-appropriate fallback,
#                     printed once in the boot report.
# preset: custom    → reads the sounds:/particles:/low-health-sounds: lists
#                     below verbatim.
#
# The lists are consulted ONLY under preset: custom; they are shown here at the
# vanilla values as an editable template (so switching to custom starts from
# the vanilla feel, not from silence). Per list entry:
#   sound     a resource location ("entity.player.hurt") or Bukkit-style name.
#             A blank/missing name skips that entry with one reload warning.
#   volume    loudness, clamped to [0.0, 4.0].
#   pitch     playback pitch, clamped to [0.5, 2.0].
#   particle  a PacketEvents particle-type name. 'block' takes a block: state.
#   block     the block-state name for block particles (ignored otherwise).
#   count-min } the burst count is picked in [count-min, count-max]; both are
#   count-max } clamped to [0, 64] and count-max is never below count-min.
#   mode      emanate → burst outward from the chest at 'speed';
#             spread  → scatter 'count' particles with per-axis Gaussian spread.
#   speed     the emanate outward speed (ignored by spread), clamped to [0, 2].
#   spread    per-axis Gaussian sigma for spread mode (x/y/z), each in [0, 4].
#
# ── The low-health extra layer ──────────────────────────────────────────────
# An OPTIONAL sound played ON TOP of the sounds above when the victim's health
# AFTER this hit drops below low-health-threshold-hearts (in HEARTS; 2 health
# = 1 heart). It is SUPPRESSED on the killing hit — a hit that leaves the
# victim at zero health plays only the normal sounds, never the layer. Under
# preset: vanilla the layer is never added; under preset: signature it is a
# glow-squid hurt chirp, which falls back to entity.squid.hurt below 1.17 (no
# glow squid existed) — printed once in the boot report. Under preset: custom
# the low-health-sounds list below is used verbatim (empty = no extra layer);
# its entries take the same sound/volume/pitch fields as the sounds list.
#   low-health-threshold-hearts  the post-hit HEARTS ceiling below which the layer
#                                fires. Clamped to [0, 100]. Default 4.0.
hit-feedback:
  preset: vanilla
  sounds:
    - sound: entity.player.hurt
      volume: 1.0
      pitch: 1.0
  particles:
    - particle: block
      block: redstone_block
      count-min: 6
      count-max: 8
      mode: emanate
      speed: 0.15
      spread: {x: 0.2, y: 0.3, z: 0.2}
  low-health-threshold-hearts: 4.0
  low-health-sounds:
    - sound: entity.glow_squid.hurt
      volume: 0.9
      pitch: 1.2
