# ──────────────────────────────────────────────────────────────────────────
#  Mental — Combat Effects preset: signature  (the shipped default)
#
#  Mental's own tune. Hits play a lodestone-break + generic-hurt +
#  breeze-deflect chord over a redstone-block burst, with a glow-squid
#  chirp layered onto low-health hits; indicators keep the shipped feel and
#  add a green healing number; a death ships the full strike — the cosmetic
#  lightning bolt, the glow-squid death call, and the REAL white/yellow/gold
#  firework blast. A sound that does not exist on an older server resolves
#  to an era-appropriate fallback, printed once in the boot report.
#
#  This is the DEFAULT preset (effects.yml selects it). There is no "vanilla"
#  preset anymore: the audibly-vanilla feel is simply "leave the Combat
#  Effects modules OFF" in config.yml — a disabled module changes nothing the
#  game does or shows, whatever this file says.
#
#  One preset = one complete Combat Effects tune: this file carries all
#  three module sections. Which preset applies is chosen in effects.yml
#  (effects.preset); the module on/off switches live in config.yml under
#  modules:. This file is yours to edit — it is extracted once and never
#  overwritten; deleting it regenerates the pristine bundle. (To tune
#  rather than fork: effects/presets/custom.yml starts at these values.)
# ──────────────────────────────────────────────────────────────────────────

display-name: Signature
description: Mental's own tune — the layered hit chord, the low-health chirp, and the full death strike.

# ── hit-feedback ────────────────────────────────────────────────────────────
# Replaces the vanilla melee hurt-sound broadcast with the sounds below and
# pops particle bursts at the victim's mid-chest.
#
# Scope matches vanilla EXACTLY: the sounds and particles reach every nearby
# player EXCEPT the victim. The victim's own client derives its hurt sound
# from the damage event and keeps doing so — that is server-unreachable
# without breaking the victim's own flinch, so it is deliberately left alone.
#
# Per sounds:/low-health-sounds: entry:
#   sound     a resource location ("entity.player.hurt") or Bukkit-style name.
#             A blank/missing name skips that entry with one reload warning.
#   volume    loudness, clamped to [0.0, 4.0].
#   pitch     playback pitch, clamped to [0.5, 2.0].
#
# Per particles: entry:
#   particle  a PacketEvents particle-type name. 'block' takes a block: state;
#             'dust' takes its RRGGBB hex color in the block field.
#   block     the block-state name for block particles (hex color for dust).
#   count-min } the burst count is picked in [count-min, count-max]; both are
#   count-max } clamped to [0, 64] and count-max is never below count-min.
#   mode      emanate → burst outward from the chest at 'speed';
#             spread  → scatter the count with per-axis Gaussian spread.
#   speed     the emanate outward speed (ignored by spread), clamped to [0, 2].
#   spread    per-axis Gaussian sigma for spread mode (x/y/z), each in [0, 4] —
#             inert under emanate, so the signature burst carries zeros.
#
# The low-health extra layer: played ON TOP of the sounds above when the
# victim's health AFTER this hit drops below low-health-threshold-percent
# PERCENT of the victim's own maximum health (not absolute hearts — the
# ceiling scales with a scaled-max-health victim; on a normal 20-max player
# 35 means below 7 health = 3.5 hearts). Unlike the normal sounds, the
# low-health layer is ALSO played to the victim, so the player under pressure
# hears it too. It is SUPPRESSED on the killing hit — death-effects owns that
# moment. The glow-squid chirp falls back to entity.squid.hurt below 1.17 (no
# glow squid existed), printed once in the boot report.
hit-feedback:
  sounds:
    - sound: block.lodestone.break
      volume: 1.0
      pitch: 1.0
    - sound: entity.generic.hurt
      volume: 0.85
      pitch: 0.75
    - sound: entity.breeze.deflect
      volume: 0.75
      pitch: 1.15
  particles:
    - particle: block
      block: redstone_block
      count-min: 6
      count-max: 8
      mode: emanate
      speed: 0.15
      spread: {x: 0.0, y: 0.0, z: 0.0}
  low-health-threshold-percent: 35
  low-health-sounds:
    - sound: entity.glow_squid.hurt
      volume: 0.9
      pitch: 1.2

# ── damage-indicators ───────────────────────────────────────────────────────
# Pops a floating damage number off the victim, drawn ONLY on the attacker's
# screen (a client-only packet armour stand — no real entity exists and no
# bystander sees it). It spawns on a front-half ring around the victim's
# chest and falls under a light ballistic model, despawning the instant it
# reaches its spawn ground plane or at lifetime-ticks, whichever comes first.
#
# ONE number per hit WINDOW, showing the final ROLLED amount. A fresh hit's
# marker is held for roll-hold-ticks (below) before it shows; a stronger hit
# landing inside the victim's brief invulnerability window (vanilla deals only
# the DIFFERENCE there, silently) FOLDS into that one marker — its amount is
# added in and the marker updates — instead of popping a second "-0.3 ❤" ghost.
#
#   text / crit-text  the label templates. {HEALTH} is the final damage in
#                     DAMAGE POINTS — the raw amount the health bar loses, NOT
#                     halved into hearts, so a bare-fist hit reads 1 (not 0.5);
#                     one decimal, a trailing .0 stripped, '&' colour codes
#                     translated. The crit variant is used on a critical hit (an
#                     era-crit posture) OR damage at/above crit-threshold-percent
#                     of the victim's max (total) health — the margin scales
#                     with a scaled-max-health victim.
#   heal-text         the HEALING-indicator template, shown to the LAST player
#                     who hit the healed player within the last 10s (any heal
#                     source — pots, regen, golden apples, and even a plugin's
#                     own setHealth). {HEALTH} is the healed amount in DAMAGE
#                     POINTS. Heals are aggregated to at most one stand per 10
#                     ticks, so a regen drip does not spam stands. An EMPTY string
#                     disables healing indicators entirely (no stand, and no
#                     heal is even sampled) — the era-exact no-op.
#   roll-hold-ticks   how many server ticks a fresh hit's marker is held before
#                     it shows, so mid-window upgrade differences fold into the
#                     one rolled number rather than spawning their own stand.
#                     0 shows the marker the same tick (upgrades then update the
#                     live stand in place). Clamped to [0, 10]; purely cosmetic.
#   lifetime-ticks    hard despawn age in ticks. Clamped to [1, 200].
#   ring-radius       how far off the chest, in blocks, the number spawns on
#                     the front-half ring. Clamped to [0, 4].
#   height-jitter     random vertical spawn offset, in blocks, so stacked hits
#                     do not overlap. Clamped to [0, 2].
#   launch-vertical   initial upward speed, blocks/tick. Clamped to [0, 2].
#   launch-outward    initial away-from-victim speed, blocks/tick. [0, 2].
#   gravity           downward pull each tick, blocks/tick². Clamped [0, 0.5].
#   drag              per-tick velocity retention (1.0 = frictionless).
#                     Clamped to [0.5, 1.0].
damage-indicators:
  lifetime-ticks: 40
  ring-radius: 0.6
  height-jitter: 0.3
  launch-vertical: 0.25
  launch-outward: 0.06
  gravity: 0.05
  drag: 0.98
  text: "&f-{HEALTH} &c❤&r"
  crit-text: "&c&l** -{HEALTH} ❤ **"
  crit-threshold-percent: 25.0
  roll-hold-ticks: 3
  heal-text: "&a+{HEALTH} &c❤&r"

# ── death-effects ───────────────────────────────────────────────────────────
# What plays the moment a player dies, from ANY cause (PlayerDeathEvent).
# Everything here is a PACKET RENDER only, never a real entity: the lightning
# bolt and the firework rocket are drawn client-side, so by construction
# there is no fire, no damage, no knockback, and no block interaction.
#
#   lightning   a cosmetic packet lightning bolt at the death spot.
#   firework:
#     colors:   the blast colors as RRGGBB hex strings (a leading # is
#               tolerated). Vanilla's firework PARTICLE carries no color on
#               the wire, so Mental does what vanilla itself does: the colors
#               ride a packet-only rocket's item data and the client renders
#               the colored explosion when it detonates (entity status 17).
#               An EMPTY list launches no firework at all. One inherent side
#               effect, documented honestly: the CLIENT self-plays the blast
#               pop when it renders the explosion — that sound is baked into
#               vanilla's firework rendering.
#   sounds: / particles:  the same entry fields as hit-feedback's lists. The
#               glow-squid call falls back to entity.squid.death below 1.17.
#               The signature tune needs no particles — the real colored
#               blast replaced the old dust approximation — so the list ships
#               empty; to layer gold dust on top, for example:
#                 particles:
#                   - particle: dust
#                     block: ffaa00
#                     count-min: 8
#                     count-max: 12
#                     mode: spread
#                     speed: 0.0
#                     spread: {x: 0.5, y: 0.5, z: 0.5}
death-effects:
  lightning: true
  firework:
    colors:
      - ffffff
      - ffff55
      - ffaa00
  sounds:
    - sound: entity.glow_squid.death
      volume: 1.0
      pitch: 0.95
  particles: []
  # kill-title: the big title + subtitle flashed to the KILLER at the moment
  # they kill an ENEMY player — PvP only, never a mob/environmental death and
  # never a self-kill. Both lines translate '&' colour codes and, when
  # PlaceholderAPI is installed, its %placeholders%. Mental's own tokens are
  # substituted first:
  #   {NAME} / {VICTIM}   the player you just killed
  #   {KILLER}            you (the killer)
  #   {PROTECT_SECONDS}   the configured Drop Protection window in whole seconds
  #                       (blank when the Drop Protection feature is disabled)
  # Leave BOTH title and subtitle empty to send no title — the era-exact no-op
  # that keeps this section silent even with the module on. The three timings
  # are client title ticks (20 ticks = 1 second).
  kill-title:
    title: "&c&lKILLED:&r &f{NAME}&r"
    subtitle: "&c➥&r &7This player's drops are protected for &r&f&n15s&r&7!"
    fade-in: 5
    stay: 40
    fade-out: 10
