# ──────────────────────────────────────────────────────────────────────────
#  legacy-1.7 — the 1.7.10 combat model (Mental's default)
#
#  Vanilla-era knockback values with 1.7.10 DELIVERY: the server never
#  reverted a victim's motion after knockback, so quick successive hits
#  compounded into combos (modifiers.combos below). The math itself is
#  byte-identical to 1.8.9 — only delivery differed between the eras.
#
#  This preset is regenerated when the file is missing; your edits stay.
#  For the full schema with every knob explained, see custom.yml.
# ──────────────────────────────────────────────────────────────────────────
display-name: Legacy 1.7
description: "The 1.7.10 combat model: vanilla-era values with ledger combos."

knockback:
  base:
    horizontal: 0.4
    vertical: 0.4
  vertical-mode: add
  extra:
    horizontal: 0.5
    vertical: 0.1
  wtap-extra:
    enabled: false
    horizontal: 0.5
    vertical: 0.1
  friction:
    x: 0.5
    y: 0.5
    z: 0.5
  limits:
    vertical: 0.4
    vertical-min: -3.9
    horizontal: -1
  air:
    horizontal: 1.0
    vertical: 1.0
  add:
    horizontal: 0.0
    vertical: 0.0
  range-reduction:
    enabled: false
    start-distance: 3.0
    factor: 0.025
    offset: 1.2
    max-reduction: 0.12
  # When the victim's client receives the knock relative to their physics
  # tick. tracker = the 1.7.10 wire (one decay tick before the packet ships
  # — ground hits lose a full friction step; measured on vanilla). immediate
  # = the 1.8.9 melee path. Rod/projectile knocks rode the tracker on BOTH
  # eras.
  delivery:
    melee: tracker
    projectile: tracker
  modifiers:
    sprint: 1.0
    combos: true
    armor-resistance: none
    shield-blocking-cancels: true
