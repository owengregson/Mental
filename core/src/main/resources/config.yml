# ──────────────────────────────────────────────────────────────────────────
#  Mental — latency-compensated 1.7.10 combat
#
#  This file is the control panel: module switches and plugin-wide policy.
#  The mechanics themselves live next door —
#    knockback.yml            which knockback profile applies where, plus
#                             rod, fishing and projectile mechanics
#    hit-registration.yml     the async hit pipeline and its fast path
#    latency-compensation.yml ping-aware knockback correction
#    profiles/                one file per knockback profile; presets are
#                             regenerated when missing, edits are yours
#
#  Everything here is managed in-game through the Mental menu — run /mental
#  (op only): module switches, the server-wide knockback profile, anticheat
#  posture, and debug. Changes apply atomically — no hit is ever
#  processed against a half-applied config. The console can still reload with
#  /mental reload. Editing files by hand still works; reload to apply.
# ──────────────────────────────────────────────────────────────────────────
config-version: 2

# Module switches. A disabled module does nothing at all to the game.
modules:
  # Asynchronous hit registration — attack packets validated on the netty
  # thread, damage dispatched straight to the victim's owning thread.
  hit-registration: true
  # W-tap registration — the fast path reads the attacker's sprint state in
  # packet-arrival order, the way the era's inbound queue did: a w-tap or
  # s-tap counts even when its sprint toggles land in the same tick as the
  # follow-up attack, however fast the tap. Disabled, sprint state comes
  # from the tick-frozen snapshot and a tap must beat the tick boundary to
  # register (taps shorter than one client tick send no packets at all —
  # that limit is the client's, identical on the era servers).
  wtap-registration: true
  # Melee knockback through the velocity pipeline, shaped by the selected
  # knockback profile (knockback.yml).
  knockback: true
  # Ping-aware vertical-knockback compensation.
  latency-compensation: true
  # 1.7.10 rod combat: hooks are real zero-damage hits that knock.
  fishing-knockback: true
  # 1.7.10 rod cast feel: launch speed, spread, and flight gravity.
  rod-velocity: true
  # 1.7.10 projectile knockback: snowballs, eggs, pearls, and arrows.
  projectile-knockback: true
  # Remove the 1.9 attack cooldown. 1.7/1.8 had no attack-speed attribute at all.
  # Two halves: (1) the client charge bar / greyed-swing is suppressed by rewriting
  # the outbound UPDATE_ATTRIBUTES attack_speed to 1024.0 (client delay rounds to
  # zero); (2) the SERVER attack_speed base is raised to 1024.0 too, so vanilla
  # Player#attack deals full-charge damage on every swing. Half (2) is what makes
  # spam-clicking deal full damage on hits Mental's fast path does NOT own — a mob
  # on Folia, or any hit while fast-path is off — which were otherwise scaled to
  # ~20% per the 1.9 cooldown ramp. The server base is captured and restored on
  # quit/disable (zero-touch). Folia-safe (per-player writes run on the owning
  # region). NOTE: a full server charge also re-enables 1.9 sweep attacks on the
  # vanilla path (1.7/1.8 had none) — enable the no-sweep module to suppress them.
  # Default OFF (era-exact no-op when disabled).
  attack-cooldown: false
  # Suppress the 1.9 swing-result sounds (entity.player.attack.crit/knockback/
  # nodamage/strong/sweep/weak). None of these existed in 1.7.10 or 1.8.9 —
  # combat on those versions was silent on every swing. Cosmetic only; no
  # gameplay state is touched. Default OFF (era-exact no-op when disabled).
  disable-attack-sounds: false
  # Disables the 1.9 sweep attack: cancels ENTITY_SWEEP_ATTACK damage events so
  # swords deal single-target damage as in 1.7/1.8, and hides the sweep_attack
  # particle via a netty packet intercept. Both effects are controlled by this
  # one flag. Default OFF (era-exact no-op when disabled).
  disable-sword-sweep: false
  # Makes the listed items uncraftable by clearing the crafting result slot when
  # the output would be a blocked material. SHIELD is the default blocked item —
  # complements disable-offhand, since the shield can only enter the off-hand
  # slot via the crafting table output on modern Paper. Configure the blocked
  # list in the disable-crafting section below. Default OFF (era-exact no-op).
  disable-crafting: false
  # Blocks players from placing or using items in the off-hand slot (slot 40).
  # The off-hand was added in 1.9; on a 1.7/1.8 era server the slot does not
  # exist. When enabled, all paths through which an item can enter the off-hand
  # are intercepted: the F-key swap, inventory clicks, number-key hotbar swaps,
  # drags, and the strip-on-join/world-change fallback. Configure which items
  # are affected in the disable-offhand section below. Default OFF (era-exact
  # no-op when disabled).
  disable-offhand: false
  # Restores 1.8.9 golden apple and enchanted golden apple potion effects, and
  # re-registers the notch-apple (enchanted golden apple) crafting recipe that
  # was removed in 1.9 (8 gold BLOCKS around 1 apple). The normal golden apple
  # recipe (8 gold INGOTS) is NEVER touched. Effect tables are pinned to the
  # decompiled 1.8.9 values: Regen II 100 t + Absorption I 2400 t (gapple);
  # Regen V 600 t + Resistance I 6000 t + Fire Res I 6000 t + Absorption I
  # 2400 t (napple). Default OFF (era-exact no-op when disabled).
  old-golden-apples: false
  # Removes the 1.9 1-second ender-pearl throw cooldown, restoring 1.8 pearl
  # spam. Era truth: 1.8.9 had no ender-pearl cooldown; the 20-tick (1 s)
  # cooldown was added in 1.9. Clears the cooldown via setCooldown(ENDER_PEARL,
  # 0) after each throw — CraftBukkit resolves the right cooldown group
  # internally on every version (including the 1.21.2+ use_cooldown component).
  # Default OFF (era-exact no-op when disabled).
  disable-enderpearl-cooldown: false
  # Restores the 1.8 natural health regeneration model: heal 1 HP (half a heart)
  # every 80 ticks (4 seconds) when foodLevel >= 18, provided health is between
  # 0 and max and the world gamerule naturalRegeneration is on. Suppresses the
  # 1.9+ fast saturated regen (SATIATED reason). Era values pinned from decompiled
  # 1.8.9 FoodStats (xg.java). Each player gets its own per-player EntityScheduler
  # task — Folia-correct, zero global player loops. Default OFF (era-exact no-op).
  old-player-regen: false
  # Restores the 1.8 flat armour damage reduction (4% per armour point, NO
  # toughness), replacing the modern toughness-based model. Applies the full era
  # pipeline in order: armour points -> resistance -> armour-enchant EPF ->
  # absorption. Covers all armour-respecting damage (mob melee, projectiles,
  # explosions, fire, lava, contact); armour-ignoring causes (fall, drowning,
  # void, magic, ...) are excluded exactly as 1.8 NMS did. EPF is computed
  # deterministically (no per-hit randomness) since clients never predict armour,
  # so the jitter is invisible. Era values pinned from decompiled 1.8.9 (pr.java/
  # acr.java/ack.java). Implemented by overriding the granular damage modifiers
  # (ARMOR/RESISTANCE/MAGIC/ABSORPTION) at LOWEST priority — the deprecated
  # modifier setter only throws when a modifier is absent, so we only ever write
  # applicable ones.
  # Default OFF (era-exact no-op when disabled).
  old-armour-strength: false
  # Restores the 1.8 armour-durability Unbreaking skip: worn armour takes its
  # vanilla durability wear only 60 + 40/(level+1) % of hits (so it survives more
  # hits as Unbreaking rises), in place of modern armour's generic
  # level/(level+1). The per-hit wear MAGNITUDE is left at vanilla's
  # max(1, floor(damage/4)) — identical 1.8<->modern, so it is never changed
  # (a flat-1 override would NOT be era-exact). At Unbreaking 0 nothing skips, as in
  # 1.8 NMS. Only currently-worn armour pieces are affected (elytra excluded).
  # Era values pinned from decompiled 1.8.9 (acg.java/wm.java). Implemented on
  # PlayerItemDamageEvent at LOWEST
  # priority, on the player's region thread (Folia-safe, no scheduler).
  # Default OFF (era-exact no-op when disabled).
  old-armour-durability: false
  # Restores the pre-1.9 (1.8) potion DURATIONS. 1.9 shortened many potion
  # durations; this rewrites a potion's effect back to its 1.8 length when a
  # player drinks it (PlayerItemConsumeEvent), throws a splash/lingering potion
  # (right-click), or a dispenser fires one (BlockDispenseEvent). The era
  # duration table (drink/splash, in seconds) is converted to
  # ticks: Strength 180/135 s, Swiftness 180/135 s, Fire Resistance 180 s,
  # Weakness 90 s, Poison 45/33 s, Regeneration 45/33 s, Night Vision 180 s,
  # Invisibility 180/135 s, Water Breathing 180/135 s, Slowness 90/67 s, Leaping
  # 180/135 s, with strong/long variants where applicable. Instant potions
  # (Healing/Harming) and no-effect bases (Water, Awkward, ...) are left
  # untouched. The potion item's PotionMeta is rewritten in place (base set to a
  # no-effect Water type + a custom effect at the era duration), cross-version via
  # setBasePotionType (modern) with a setBasePotionData fallback (pre-1.20.5).
  # This is the DURATION half only — Strength/Weakness damage VALUES are separate.
  # Default OFF (era-exact no-op when disabled).
  old-potion-durations: false
  # Restores the pre-1.9 (1.8) Strength/Weakness damage VALUES. 1.9 weakened
  # Strength and strengthened Weakness: era Strength was MULTIPLICATIVE on the
  # weapon base (factor 1 + 2.5*(amp+1) — Strength I x3.5, Strength II x6.0, far
  # stronger than 1.9's flat +3*(amp+1)), and era Weakness subtracted only
  # 2.0*(amp+1) (1.9 doubled it to 4.0*(amp+1)). Era values pinned from
  # decompiled 1.8.9 (pe.java/rv.java). Applied to
  # the weapon base BEFORE the crit x1.5 and BEFORE the Sharpness additive
  # (era order, wn.java:761-764), clamped >= 0. Implemented in the fast-path
  # DamageCalculator. SCOPE: fast-path PvP melee only (the dominant case) — mob
  # attacks and fast-path-off hits keep vanilla Strength/Weakness. This is the
  # VALUES half only; potion DURATIONS are the separate old-potion-durations module.
  # Default OFF (era-exact no-op when disabled).
  old-potion-values: false
  # Applies the 1.8 era critical-hit multiplier (x1.5 on attack damage) for
  # player melee hits that vanilla missed because the 1.9 sprint/cooldown
  # requirement was not satisfied. Era crit (1.8): attacker is falling, airborne,
  # off ladder, out of water, sighted, unmounted — sprinting was NEVER an exclusion
  # and there was no attack cooldown [wn.java:760]. Vanilla 1.9+ added two extra
  # gates: cooldown > 0.9 AND not sprinting. This module fires x1.5 on BASE damage
  # when the era rule triggers but those 1.9 gates would have blocked it (i.e. the
  # attacker was sprinting or the cooldown bar was not full). SCOPE: fast-path-OFF
  # player melee only — when Mental's fast path is ON, DamageCalculator already
  # applies the era crit with the correct ordering (weapon base before Sharpness);
  # this module is a no-op when the fast path is ON. Fast-path-off is a minority
  # case: most PvP hits on a Mental server go through the fast path.
  # Default OFF (era-exact no-op when disabled).
  old-critical-hits: false
  # Restores weapon durability loss on Mental's fast-path melee hits, which the
  # fast path otherwise OMITS by design: the fast path applies damage via a direct
  # damage(amount) call, which (unlike vanilla's Player#attack) never runs the
  # attack-time durability step, so a weapon never wears on a Mental-registered
  # hit. With this on, the attacker's main-hand weapon loses 1 durability per
  # accepted hit (the era 1.7->modern attack case; block-break is 2, the ATTACK
  # case is 1), modified by the standard tool/weapon Unbreaking skip — a hit
  # damages with probability 1/(level+1) (acg.java:40, the non-armour path), so
  # level 0 always wears, level 1 wears half as often, level 3 a quarter. Only a
  # damageable weapon held in the main hand is affected; when its durability is
  # exhausted the item breaks like vanilla. This is durability only — the damage
  # VALUES are already era-correct in DamageCalculator. Implemented in the
  # fast-path HitApplier; the attacker-inventory write follows the entity's owning
  # region thread (Folia-safe), mirroring the fast path's sprint-flag clear.
  # Default OFF (era-exact no-op when disabled).
  old-tool-durability: false
  # Restores 1.7-style right-click sword blocking. Right-clicking with a sword
  # in the main hand raises it to block, and a blocked melee hit takes
  # (1 + damage) * 0.5 — a reduction of (damage - 1) * 0.5 (the 1.8 model; e.g.
  # an 8-damage hit takes 4.5). Two mechanisms cover the whole version range,
  # chosen automatically by the data-component classes the server has (never by
  # a version number); exactly one is ever live, so the reduction never doubles.
  #
  # Modern component path (1.21+) — an in-place sword block pose:
  #   Tier A (BLOCKS_ATTACKS present, ~1.21.5+): the held sword gets a
  #     BLOCKS_ATTACKS component whose DamageReduction reproduces the 1.8
  #     reduction NATIVELY, so the server itself reports isBlocking() and runs
  #     the blocked-damage pipeline (no software reduction).
  #   Tier B (CONSUMABLE present, BLOCKS_ATTACKS absent, 1.21.0-1.21.4): the
  #     held sword gets a CONSUMABLE component with a BLOCK use animation so the
  #     server enters the blocking state; the (damage - 1) * 0.5 reduction is
  #     applied in software (the damage event), since the component does not
  #     reduce on this tier.
  #
  # Off-hand-shield path (1.17.1-1.20.6) — Tier C, no component model: an
  #   in-place sword pose is impossible, so a real SHIELD is briefly injected
  #   into the OFF-HAND (native isBlocking() works on every version with a
  #   shield) and the (damage - 1) * 0.5 reduction is applied in software. The
  #   injected shield is marked so it is always restored to your real off-hand
  #   item on release / hotbar / swap / off-hand click / drop / death / world
  #   change / quit and on disable — it is never left stuck in your inventory.
  #   Honest client-fidelity limit: because this injects a shield, the client
  #   shows the SHIELD pose, not the lowered-sword pose (the 1.7 pose is a
  #   client asset that cannot be reproduced server-side on these versions).
  #
  # Era truth (all paths): a blocked hit still knocks the victim FULL — only the
  # DAMAGE is reduced. Mental owns knockback; a block never cancels or zeroes
  # velocity. The block ends and the component is stripped / the shield restored
  # on release / hotbar / swap / drop / death / world change / quit and on
  # disable, so neither a stray component nor a stuck shield is ever left behind.
  # Default OFF (era-exact no-op when disabled).
  sword-blocking: false
  # Restores the 1.7/1.8-era melee reach (3.0 blocks) and hitbox margin (0.1) as
  # far as the modern server allows, using whichever per-version lever the server
  # exposes (chosen automatically by capability, never a version number).
  #
  # HARD LIMIT (read this first): the CLIENT picks the melee target and sends a
  # fixed entity id that the server resolves verbatim — there is NO server-side
  # raytrace on the attack path. True 1.7 target-SELECTION geometry therefore
  # lives in the client and cannot be reproduced server-side. This module tunes
  # the reach GATE and the targeting MARGIN only; target selection stays whatever
  # the modern client does (already close to 1.7 for melee). Net effect = era
  # reach distance + a small hitbox margin (1.21.5+).
  #
  # Per-version levers:
  #   1.17.1-1.20.4: NO interaction-range attribute and NO attack-range component
  #     exist; the gate is a hardcoded 6 blocks, already more lenient than era 3.0,
  #     with no safe per-player lever. This module is a complete NO-OP here.
  #   1.20.5+: the ENTITY_INTERACTION_RANGE attribute base is pinned to era 3.0
  #     (and restored to its original on quit / disable). The vanilla base is
  #     already 3.0, so the meaningful effect is RESETTING any third-party
  #     inflation back to era reach; the server's leniency added on top cannot be
  #     removed from this surface.
  #   1.21.5+: additionally, the held weapon gets the era ATTACK_RANGE item data
  #     component (max_reach 3.0, hitbox_margin 0.1, creative 4.0) — the real
  #     "old hitbox" lever. The component is stripped again on hotbar / swap /
  #     drop / death / world change / quit and on disable.
  #
  # Fully reversible (zero-touch): on disable the original attribute base is
  # restored for every online player and the ATTACK_RANGE component is stripped
  # from their hands, so neither a tightened attribute nor a stray component is
  # ever left behind. Default OFF (era-exact no-op when disabled).
  old-hitboxes: false
  # Combo hold — the "pocket servo". Makes HOLDING a classic 1.8 sweet-spot combo
  # easier by shaping ONLY the fresh horizontal knock so the victim lands in the
  # attacker's un-retaliatable pocket, one swing from now — hittable on rhythm,
  # geometrically unable to answer. It is NOT the "combo" arcade gamemode (no
  # hit-delay changes, no juggling): normal 10-tick cadence, sweet-spot combos.
  #
  # It engages only once a real combo is detected (3+ melee hits from one attacker
  # at combo cadence), scales the knock by an EXACT inverse solve of the era flight
  # equations (so the victim lands at the configured target separation), and is
  # bounded by honest clamps — past them the pocket is lost and era physics wins.
  # It never touches the vertical, the victim's own residual motion, reach, or
  # hit-delay, and it does nothing to any pair not in an active combo. Works under
  # whichever knockback profile is active. Tune it in the combo-hold section below.
  #
  # This is Mental's own novel mechanic (no community precedent), so it is strictly
  # server-opt-in: it defaults OFF and no bundled config pre-enables it. Field-judge
  # the feel before trusting it in production. Default OFF (era-exact no-op).
  combo-hold: false
  # combo-reach-handicap: while a victim is held in a combo, scale DOWN their
  # entity-interaction-range attribute so their own client raycast shortens and they
  # cannot answer. Since 2.4.5 it runs STANDALONE — it drives combo detection itself,
  # so it engages with combo-hold off (and composes with the servo when both are on:
  # a shorter victim reach opens the servo's keepable pocket). 1.20.5+ ONLY (the
  # attribute is client-synced there). For the SERVER-SIDE enforcement leg against
  # attribute-blind clients you must ALSO enable hit-registration.reach-validation.
  # Tuned in the combo-reach-handicap section below. Default OFF (era-exact no-op).
  #
  # (Moved in 2.4.4: this was the nested combo-hold.reach-handicap.enabled sub-knob.
  # An upgraded config with the old nested key still works for one release — it is
  # honoured with a loud reload notice — but move it here.)
  combo-reach-handicap: false
  # POTS family — two independent splash-potion utilities. These are PvP-server
  # conveniences, not a 1.7/1.8 restoration; both default OFF and touch nothing
  # while disabled.
  #
  # pot-fill: registers the /potfill command (aliases /pots, /pf) — fills every
  # empty slot of your main inventory (the 36 main + hotbar slots; armour and
  # off-hand are never touched) with a glowing splash Instant Health II potion.
  # The command is registered on enable and REMOVED on disable, so a disabled
  # module leaves no command or tab-completion behind. Permission and an optional
  # per-potion economy cost are configured in the pot-fill section below.
  # Default OFF.
  pot-fill: false
  # fast-pots: the classic "fast pot" self-heal, made reliable. When you throw a
  # splash potion while looking down more steeply than fast-pots.angle-degrees,
  # Mental re-aims it at your own feet (predicting where they will be by the time
  # it lands) and multiplies its speed, so the splash lands on you instantly.
  # Throws shallower than the angle are left completely untouched, and LINGERING
  # potions are never redirected (this aids the instant splash, not the cloud).
  # Tuned in the fast-pots section below. Default OFF.
  fast-pots: false

# Off-hand slot filter, active when modules.disable-offhand is true.
#
# whitelist: true  → only materials listed in 'items' are permitted in the
#                    off-hand; anything else is blocked.  An empty list blocks
#                    ALL items (the maximally restrictive era default).
# whitelist: false → materials listed in 'items' are blocked; everything else
#                    is allowed.  An empty list allows everything.
#
# Any material name recognised by Bukkit's Material.matchMaterial() is valid.
# Unknown names warn on reload and are skipped — the rest of the list applies.
#
# denied-message: the message shown when an action is denied ('' to suppress).
#   '&' colour codes are translated.
#disable-offhand:
#  whitelist: true
#  items: []
#  denied-message: "&cOff-hand is disabled"

# Combo-hold servo, active when modules.combo-hold is true. All knobs shown at
# their defaults; the block is optional (an absent section uses these values).
#
# ── Detector: when is a combo "active"? ────────────────────────────────────
#   min-hits            hits from ONE attacker before the servo engages (the
#                       first develops the chain; the second confirms intent and
#                       engages the servo — two hits, no retaliation = in combo).
#   max-gap-ticks       an inter-hit gap longer than this ends the chain — era
#                       sweet-spot cadence is ~10-12 ticks, so 20 is generous.
#   grounded-run-ticks  consecutive grounded ticks that end the combo: brief
#                       ground-skims survive, a real touchdown (10) ends it.
#   blowout-blocks      separation past this ends the combo (the pocket is gone).
# A false positive mid-scrap is harmless: it costs only one clamped knock nudge,
# so these thresholds err toward NOT detecting a combo.
#
# ── Servo: where does the victim land? ─────────────────────────────────────
# The 2.4.5 redesign lands the victim right at the ANSWER-DENIAL BOUNDARY: the
# separation where, at the moment they could first swing back (their ping + the
# turn they'd need), their reach-back is denied by a hair while YOU can still reach
# them. It PUSHES OUT to that edge and only pulls IN if the natural knock would
# eject them past your own reach — the opposite of the old "pull into the least
# separation" servo, which dragged the victim into their own retaliation range.
# Vertical is deliberately never touched — the profile's launch height buys the
# vertical margin the geometry reads.
#   gain         blends toward the full exact solve (1.0 = exact; lower softens).
#   min-factor   } the honesty clamps on the knock multiplier. [0.93, 1.35] is the
#   max-factor   } calibrated band (2.4.6 undershoot fix): the servo's chase floor
#                  centres sigma near 1.0-1.1, so the floor rarely pulls below 0.93
#                  and the ceiling admits the harder "apply more" closes; past them
#                  the pocket is honestly lost and era physics wins over a non-era knock.
#   window-ticks the cadence horizon (t*) the flight is projected over — the era
#                full-hit cadence (10). The predictor already folds the shipped
#                vertical stamp's air-time, ping horizons and the ground tail into
#                the window; this is the base cadence they shift from.
#
# ── The boundary geometry (the target knobs) ───────────────────────────────
#   target-mode  boundary | static. BOUNDARY (default) computes the geometric
#                answer-denial target from the reach geometry below. STATIC pins the
#                servo to a fixed `target` separation regardless of facing.
#                (Migration: an old `anchor` reads as STATIC, an old `dynamic` reads
#                as BOUNDARY, each with a loud reload notice.)
#   target       the STATIC-mode / no-facing FALLBACK separation (2.85, the lab's
#                held-separation equilibrium). Used whenever the geometry can't be
#                measured (the victim's facing is unknown) or under target-mode:
#                static. (This is the old `target` key, reused — a tuned value carries
#                over.)
#   victim-reach the victim's era answer reach in blocks (R_v, 3.0). The combo reach
#                handicap, when live, SHORTENS this for the held combo — a shorter
#                victim reach drops the deny boundary and OPENS the keepable pocket
#                (this is why the reach nerf keeps a combo).
#   attacker-reach   YOUR era reach (R_a, 3.0) — never handicapped.
#   deny-margin  the hair past the victim's deny boundary the servo aims for, so
#                jitter can't let them answer (0.02).
#   jitter-margin    the slack below your reach the target keeps, so you reliably
#                connect (0.15).
#   target-floor the closest the servo will EVER pull the victim in (2.5).
# (The pre-2.4.5 `hit-cap` knob is gone with the exposure-budget dynamic target; an
# upgraded config that still sets it gets one reload notice, then it is ignored.)
#
# ── Reach handicap ─────────────────────────────────────────────────────────
# The reach handicap moved to its OWN module in 2.4.4 — modules.combo-reach-handicap
# above, tuned in the combo-reach-handicap section below. Since 2.4.5 it drives combo
# DETECTION itself, so it works STANDALONE (combo-hold off) AND composes with the
# servo when both are on. (It used to live here as a nested combo-hold.reach-handicap
# block; an upgraded config with that old block still works for one release — honoured
# with a loud reload notice — but move it.)
#combo-hold:
#  min-hits: 2
#  max-gap-ticks: 20
#  grounded-run-ticks: 10
#  blowout-blocks: 6.0
#  gain: 1.0
#  min-factor: 0.93
#  max-factor: 1.35
#  window-ticks: 10
#  target-mode: boundary
#  target: 2.85
#  victim-reach: 3.0
#  attacker-reach: 3.0
#  deny-margin: 0.02
#  jitter-margin: 0.15
#  target-floor: 2.5

# Combo reach handicap, active when modules.combo-reach-handicap is true.
# While a victim is held in a combo, scale DOWN their entity-interaction-range
# attribute so their own client raycast shortens and they cannot answer. This is a
# SECONDARY lever: the combo-hold servo steers SPACING, this tightens RETALIATION.
# Applied the moment a combo goes active, removed the moment it ends by ANY reason —
# fully reversible, and swept clean on join / enable / disable so a crash never leaves
# a shortened reach in a saved profile.
#
#   STANDALONE since 2.4.5. It drives combo detection itself, so it engages with
#   combo-hold off (and composes with the servo when both are on).
#
#   1.20.5+ ONLY. The interaction-range attribute is client-synced from 1.20.5, so
#   shortening it makes the client's OWN raycast shorten (no phantom misses). Below
#   1.20.5 the attribute does not exist and this module is a documented no-op (one
#   loud line is logged if you enable it there). NOTE: ViaVersion legacy clients ignore
#   the synced attribute even on a 1.20.5+ server — the server cannot shorten their
#   reach; there is no server-side fix for those clients.
#
#   SERVER-SIDE enforcement (against attribute-blind clients that ignore the synced
#   value) rides the reach validator's backstop — it requires
#   hit-registration.reach-validation.enabled: true. With reach-validation off, the
#   handicap is purely the client-synced attribute shrink (honest clients only).
#
#   reach-scale  the multiplier on the era 3.0 reach, in [0.5, 1.0]. 0.87 → 2.61
#                blocks; an out-of-range value warns on reload and 0.87 stands. It
#                only ever SHORTENS reach (a handicap never inflates it). (The 2.4.5
#                retune lifted the floor from 0.8/2.4 — that bottom end was too severe.)
#combo-reach-handicap:
#  reach-scale: 0.87

# Items that become uncraftable when modules.disable-crafting is true.
# Any material name recognised by Bukkit's Material.matchMaterial() is valid.
# Unknown names are skipped with a config warning. SHIELD is the canonical
# default — it is the only 1.9 item a 1.7/1.8 server needs to block from the
# crafting table; remove it or add others to taste. Unrecognised names warn on
# reload and are skipped — the rest of the list still applies.
#disable-crafting:
#  items: [SHIELD]

# The /potfill command, active when modules.pot-fill is true. Fills every empty
# main-inventory slot with a glowing splash Instant Health II potion.
#
# permission:      the permission node a player must hold to run /potfill. Leave
#                  it as the default op-gated node, or point it at a rank node
#                  (e.g. "server.kit.pots") to grant it to a group. A player
#                  without it is refused with a message; the default is
#                  "mental.pots.fill".
# cost-per-potion: the price charged PER potion filled, through Vault (a soft,
#                  optional dependency — Mental never hard-depends on it).
#                    0    → free; no economy plugin is needed at all (the
#                           default).
#                    > 0  → each filled potion costs this much. The fill is a
#                           PARTIAL fill capped at what you can afford, and you
#                           are charged for exactly what was filled. With a cost
#                           set but no Vault economy installed, the command
#                           refuses honestly (it never fills for free) and one
#                           line is logged at enable.
#pot-fill:
#  permission: "mental.pots.fill"
#  cost-per-potion: 0.0

# Fast pots, active when modules.fast-pots is true. Redirects a steeply-thrown
# splash potion at your own feet at a multiplied speed.
#
# angle-degrees:    how far below the horizon your throw must aim before the
#                   redirect kicks in, as a Bukkit pitch threshold (pitch is 0
#                   at the horizon and +90 looking straight down). The redirect
#                   fires when your pitch is GREATER than this value; shallower
#                   throws are left completely untouched. Clamped to [0, 90].
#                   Default 35.0.
#
#                        horizon ── 0° ───────────────  (never redirected)
#                                    \
#                                     \   throws in this
#                                      \  band are left alone
#                          angle ──── 35° ─ ─ ─ ─ ─ ─ ─  ← threshold
#                                        \
#                                         \ steeper throws are
#                                          \ re-aimed at your feet
#                        straight down ── 90°
#
# speed-multiplier: the factor applied to the potion's normal launch speed for
#                   the redirected throw. Higher = the potion reaches your feet
#                   sooner. Clamped to [1.0, 5.0] (never slower than vanilla,
#                   capped so it cannot outrun its own splash). Default 3.0.
#fast-pots:
#  angle-degrees: 35.0
#  speed-multiplier: 3.0

# Coexistence with movement-prediction anticheats.
#   auto       — when a listed plugin is installed, suppress the risky
#                behaviors (pre-sent velocity packets, Mental's own reach
#                validation); everything else in Mental is
#                server-authoritative and needs no adjustment.
#   force-safe — always behave as if an anticheat were installed.
#   off        — never adjust.
anticheat:
  mode: auto
  known:
    - GrimAC
    - Vulcan

# Anonymous usage statistics via bStats (https://bstats.org/plugin/bukkit, id
# 31788). No player data is collected — only aggregate counts (server software,
# Mental's anticheat mode, latency probe strategy, and scheduling backend). Set
# to false to opt out entirely.
metrics:
  enabled: true

# Verbose logging. Enable globally, then pick categories. Admins can also
# subscribe to live in-game output from the Debug screen of the /mental menu.
debug:
  enabled: false
  categories:
    hitreg: false
    knockback: false
    compensation: false
    fishing: false
    projectile: false
    packets: false
    anticheat: false
    scheduling: false
    commands: false
    config: false
