# ──────────────────────────────────────────────────────────────────────────
#  Mental — latency-compensated 1.7.10 combat
#
#  This file is the control panel: module switches and plugin-wide policy.
#  The mechanics themselves live next door —
#    knockback.yml            which knockback profile applies where, plus
#                             rod, fishing and projectile mechanics
#    hit-registration.yml     the async hit pipeline and its fast path
#    latency-compensation.yml ping-aware knockback correction
#    profiles/                one file per knockback profile; presets are
#                             regenerated when missing, edits are yours
#
#  Every module can also be toggled live: /mental module <name> <on|off>
#  Reloads (/mental reload) swap the whole configuration atomically — no
#  hit is ever processed against a half-applied config.
# ──────────────────────────────────────────────────────────────────────────
config-version: 2

# Module switches. A disabled module does nothing at all to the game.
modules:
  # Asynchronous hit registration — attack packets validated on the netty
  # thread, damage dispatched straight to the victim's owning thread.
  hit-registration: true
  # Melee knockback through the velocity pipeline, shaped by the selected
  # knockback profile (knockback.yml).
  knockback: true
  # Ping-aware vertical-knockback compensation.
  latency-compensation: true
  # 1.7.10 rod combat: hooks are real zero-damage hits that knock.
  fishing-knockback: true
  # 1.7.10 rod cast feel: launch speed, spread, and flight gravity.
  rod-velocity: true
  # 1.7.10 projectile knockback: snowballs, eggs, pearls, and arrows.
  projectile-knockback: true

# Coexistence with movement-prediction anticheats.
#   auto       — when a listed plugin is installed, suppress the risky
#                behaviors (pre-sent velocity packets, Mental's own reach
#                validation); everything else in Mental is
#                server-authoritative and needs no adjustment.
#   force-safe — always behave as if an anticheat were installed.
#   off        — never adjust.
anticheat:
  mode: auto
  known:
    - GrimAC
    - Vulcan

# Coexistence with combat-rules plugins.
compatibility:
  # OldCombatMechanics divides combat with Mental: OCM owns the rules
  # (attack cooldown, sword blocking, regen, armour, golden apples), Mental
  # owns knockback and hit delivery. Where OCM's own modules reach into
  # Mental's half — old-player-knockback, old-fishing-knockback,
  # fishing-rod-velocity, projectile-knockback, old-tool-damage,
  # old-critical-hits — Mental yields exactly the interactions OCM is
  # configured to handle, per player modeset when OCM's API is available.
  # To give a mechanic to Mental, disable the corresponding OCM module (or
  # drop it from the modeset); Mental's combos, positional projectile
  # knockback and ping compensation apply to interactions Mental owns.
  #   auto   — coordinate as described (recommended).
  #   ignore — pretend OCM is absent; both plugins will fight. Not advised.
  old-combat-mechanics: auto

# Verbose logging. Enable globally, then pick categories. Subscribed admins
# (/mental debug subscribe) receive lines in-game as well.
debug:
  enabled: false
  categories:
    hitreg: false
    knockback: false
    compensation: false
    fishing: false
    projectile: false
    packets: false
    anticheat: false
    scheduling: false
    commands: false
    config: false
