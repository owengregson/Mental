# ──────────────────────────────────────────────────────────────────────────
#  Mental — the Loadout family (off-hand + crafting restrictions)
#
#  Settings only: the on/off switches live in config.yml under modules:
#  (modules.disable-offhand and modules.disable-crafting — both default
#  OFF). The two complement each other: on modern Paper the shield can only
#  enter the off-hand slot via the crafting table output, so blocking the
#  craft closes the loop the off-hand filter opens. The family's third
#  rule, old-hitboxes, has no knobs (its toggle is the whole setting).
#  Each block below is optional and shown at its defaults — an absent
#  block means exactly these values, so uncomment only what you change.
#  Deleting this file regenerates the pristine bundle.
# ──────────────────────────────────────────────────────────────────────────

# Off-hand slot filter, active when modules.disable-offhand is true
# (config.yml). All paths through which an item can enter the off-hand are
# intercepted: the F-key swap, inventory clicks, number-key hotbar swaps,
# drags, and the strip-on-join/world-change fallback.
#
# whitelist: true  → only materials listed in 'items' are permitted in the
#                    off-hand; anything else is blocked.  An empty list blocks
#                    ALL items (the maximally restrictive era default).
# whitelist: false → materials listed in 'items' are blocked; everything else
#                    is allowed.  An empty list allows everything.
#
# Any material name recognised by Bukkit's Material.matchMaterial() is valid.
# Unknown names warn on reload and are skipped — the rest of the list applies.
#
# denied-message: the message shown when an action is denied ('' to suppress).
#   '&' colour codes are translated.
#disable-offhand:
#  whitelist: true
#  items: []
#  denied-message: "&cOff-hand is disabled"

# Items that become uncraftable when modules.disable-crafting is true
# (config.yml) — the crafting result slot is cleared when the output would be
# a blocked material. Any material name recognised by Bukkit's
# Material.matchMaterial() is valid. SHIELD is the canonical default — it is
# the only 1.9 item a 1.7/1.8 server needs to block from the crafting table;
# remove it or add others to taste. Unrecognised names warn on reload and are
# skipped — the rest of the list still applies.
#disable-crafting:
#  items: [SHIELD]
