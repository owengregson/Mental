# ──────────────────────────────────────────────────────────────────────────
#  Mental — asynchronous hit registration
#
#  Attack packets are validated on the netty thread and damage is
#  dispatched straight to the victim's owning thread, skipping the vanilla
#  main-thread queue entirely. The module switch lives in config.yml.
# ──────────────────────────────────────────────────────────────────────────

hit-registration:
  # Hits per second per attacker before clicks are dropped at the packet
  # layer. 0 disables the limiter.
  max-cps: 20
  # Rewound-reach validation for player-vs-player attacks: each hit is
  # checked against where the victim WAS when the attacker threw it —
  # position history rewound by the attacker's ping plus the client's
  # entity-interpolation delay — and dropped at the packet layer when it
  # misses by more than max-reach + leniency at every candidate instant.
  # A sanity gate against blatant reach, deliberately lenient; while a
  # known anticheat is detected (anticheat.mode in config.yml) Mental
  # defers to it and this check idles. Off by default — enable it on
  # servers that run no anticheat. Creative attackers are exempt, and the
  # 1.20.5+ entity-interaction-range attribute is honored when raised.
  reach-validation:
    enabled: false
    # Survival attack reach, attacker eye to the victim's hitbox.
    max-reach: 3.0
    # Slack for hitbox/eye-height approximation and victim motion.
    leniency: 0.4
    # The client renders other entities slightly in the past; added to the
    # measured ping when choosing the rewind instant.
    interpolation-offset-ms: 100
    # Hard cap on the total rewind window.
    rewind-cap-ms: 500
  fast-path:
    # Cancel the vanilla attack packet and run Mental's pipeline instead.
    # Disable if a plugin needs the vanilla packet flow untouched.
    enabled: true
    # Ship knockback velocity + hurt feedback to clients directly from the
    # netty thread — perceived hit response improves by one RTT leg plus up
    # to a full tick. Automatically suppressed for the velocity packet when
    # an anticheat is detected (see anticheat.mode in config.yml).
    pre-send-feedback: true
    # Wrap each pre-sent burst (velocity + hurt animation) in a Bundle
    # packet on 1.19.4+ so the client applies both in the same frame —
    # atomic on-screen feedback. Older protocols have no bundle and send
    # the packets back-to-back regardless.
    bundle-feedback: true
    # Minimum interval between pre-sent feedback bursts per victim.
    # auto (the default) follows each victim's live hurt window — half of
    # maximum-no-damage-ticks, vanilla's re-hit boundary (20 ticks -> 500ms)
    # — so plugins that retune the window are honored without extra
    # configuration. Set a number to fix the interval in milliseconds instead.
    feedback-min-interval-ms: auto
    # Apply the legacy critical multiplier (1.5x on the weapon damage,
    # before enchantments — the pre-1.9 order) while the attacker is
    # falling. Sprinting does not block crits; that rule arrived in 1.9.
    simulate-crits: true
    # Pre-1.9 tool damage tables: sword 4+tier, axe 3+tier, pickaxe
    # 2+tier, shovel 1+tier (plus the 1.0 hand). A diamond sword deals 8
    # again and axes stop being heavy weapons. Sharpness is always the
    # legacy 1.25/level on this path.
    #
    # Note: the 1.9 attack-cooldown METER is separate from this path —
    # Mental never scales damage by charge, so the meter has no effect on
    # Mental-registered hits; removing it outright is the job of Mental's own
    # attack-cooldown module.
    legacy-tool-damage: true
