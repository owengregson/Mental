# ──────────────────────────────────────────────────────────────────────────
#  Mental — the Combo Solver family (combo-hold + combo-reach-handicap)
#
#  Settings only: the on/off switches live in config.yml under modules:
#  (modules.combo-hold and modules.combo-reach-handicap — both default OFF).
#  The two compose: the servo steers SPACING, the handicap tightens
#  RETALIATION, and a handicapped victim reach opens the servo's keepable
#  pocket. Each block below is optional and shown at its defaults — an
#  absent block means exactly these values, so uncomment only what you
#  change. Deleting this file regenerates the pristine bundle.
# ──────────────────────────────────────────────────────────────────────────

# Combo-hold servo, active when modules.combo-hold is true (config.yml). All
# knobs shown at their defaults; the block is optional (an absent section uses
# these values).
#
# ── Detector: when is a combo "active"? ────────────────────────────────────
#   min-hits            hits from ONE attacker before the servo engages (the
#                       first develops the chain; the second confirms intent and
#                       engages the servo — two hits, no retaliation = in combo).
#   max-gap-ticks       an inter-hit gap longer than this ends the chain — era
#                       sweet-spot cadence is ~10-12 ticks, so 20 is generous.
#   grounded-run-ticks  consecutive grounded ticks that end the combo: brief
#                       ground-skims survive, a real touchdown (10) ends it.
#   blowout-blocks      separation past this ends the combo (the pocket is gone).
# A false positive mid-scrap is harmless: it costs only one clamped knock nudge,
# so these thresholds err toward NOT detecting a combo.
#
# ── Servo: where does the victim land? ─────────────────────────────────────
# The 2.4.5 redesign lands the victim right at the ANSWER-DENIAL BOUNDARY: the
# separation where, at the moment they could first swing back (their ping + the
# turn they'd need), their reach-back is denied by a hair while YOU can still reach
# them. It PUSHES OUT to that edge and only pulls IN if the natural knock would
# eject them past your own reach — the opposite of the old "pull into the least
# separation" servo, which dragged the victim into their own retaliation range.
# Vertical is deliberately never touched — the profile's launch height buys the
# vertical margin the geometry reads.
#   gain         blends toward the full exact solve (1.0 = exact; lower softens).
#   min-factor   } the honesty clamps on the knock multiplier. [0.93, 1.35] is the
#   max-factor   } calibrated band (2.4.6 undershoot fix): the servo's chase floor
#                  centres sigma near 1.0-1.1, so the floor rarely pulls below 0.93
#                  and the ceiling admits the harder "apply more" closes; past them
#                  the pocket is honestly lost and era physics wins over a non-era knock.
#                  When the solve lands so far below min-factor that even the clamped
#                  shave cannot approach the pocket (sigma* < 2*min-factor - 1 — every
#                  sprint-fresh chase hit does), the servo declines the shave entirely
#                  and ships the FULL era knock instead of a pointless min-factor shave.
#   window-ticks the cadence horizon (t*) the flight is projected over — the era
#                full-hit cadence (10). The predictor already folds the shipped
#                vertical stamp's air-time, ping horizons and the ground tail into
#                the window; this is the base cadence they shift from.
#
# ── The boundary geometry (the target knobs) ───────────────────────────────
#   target-mode  boundary | static. BOUNDARY (default) computes the geometric
#                answer-denial target from the reach geometry below. STATIC pins the
#                servo to a fixed `target` separation regardless of facing.
#                (Migration: an old `anchor` reads as STATIC, an old `dynamic` reads
#                as BOUNDARY, each with a loud reload notice.)
#   target       the STATIC-mode / no-facing FALLBACK separation (2.85, the lab's
#                held-separation equilibrium). Used whenever the geometry can't be
#                measured (the victim's facing is unknown) or under target-mode:
#                static. (This is the old `target` key, reused — a tuned value carries
#                over.)
#   victim-reach the victim's era answer reach in blocks (R_v, 3.0). The combo reach
#                handicap, when live, SHORTENS this for the held combo — a shorter
#                victim reach drops the deny boundary and OPENS the keepable pocket
#                (this is why the reach nerf keeps a combo).
#   attacker-reach   YOUR era reach (R_a, 3.0) — never handicapped.
#   deny-margin  the hair past the victim's deny boundary the servo aims for, so
#                jitter can't let them answer (0.02).
#   jitter-margin    the slack below your reach the target keeps, so you reliably
#                connect (0.15).
#   target-floor the closest the servo will EVER pull the victim in (2.5).
# (The pre-2.4.5 `hit-cap` knob is gone with the exposure-budget dynamic target; an
# upgraded config that still sets it gets one reload notice, then it is ignored.)
#
# ── Reach handicap ─────────────────────────────────────────────────────────
# The reach handicap moved to its OWN module in 2.4.4 — modules.combo-reach-handicap
# in config.yml, tuned in the combo-reach-handicap section below. Since 2.4.5 it
# drives combo DETECTION itself, so it works STANDALONE (combo-hold off) AND composes
# with the servo when both are on. (It used to live inside this block as a nested
# combo-hold.reach-handicap section; an upgraded config with that old block still
# works for one release — honoured with a loud reload notice — but move it.)
#combo-hold:
#  min-hits: 2
#  max-gap-ticks: 20
#  grounded-run-ticks: 10
#  blowout-blocks: 6.0
#  gain: 1.0
#  min-factor: 0.93
#  max-factor: 1.35
#  window-ticks: 10
#  target-mode: boundary
#  target: 2.85
#  victim-reach: 3.0
#  attacker-reach: 3.0
#  deny-margin: 0.02
#  jitter-margin: 0.15
#  target-floor: 2.5

# Combo reach handicap, active when modules.combo-reach-handicap is true
# (config.yml). While a victim is held in a combo, scale DOWN their
# entity-interaction-range attribute so their own client raycast shortens and
# they cannot answer. This is a SECONDARY lever: the combo-hold servo steers
# SPACING, this tightens RETALIATION. Applied the moment a combo goes active,
# removed the moment it ends by ANY reason — fully reversible, and swept clean
# on join / enable / disable so a crash never leaves a shortened reach in a
# saved profile.
#
#   STANDALONE since 2.4.5. It drives combo detection itself, so it engages with
#   combo-hold off (and composes with the servo when both are on).
#
#   1.20.5+ ONLY. The interaction-range attribute is client-synced from 1.20.5, so
#   shortening it makes the client's OWN raycast shorten (no phantom misses). Below
#   1.20.5 the attribute does not exist and this module is a documented no-op (one
#   loud line is logged if you enable it there). NOTE: ViaVersion legacy clients ignore
#   the synced attribute even on a 1.20.5+ server — the server cannot shorten their
#   reach; there is no server-side fix for those clients.
#
#   SERVER-SIDE enforcement (against attribute-blind clients that ignore the synced
#   value) rides the reach validator's backstop — it requires
#   hit-registration.reach-validation.enabled: true (hit-registration.yml). With
#   reach-validation off, the handicap is purely the client-synced attribute
#   shrink (honest clients only).
#
#   reach-scale  the multiplier on the era 3.0 reach, in [0.5, 1.0]. 0.87 → 2.61
#                blocks; an out-of-range value warns on reload and 0.87 stands. It
#                only ever SHORTENS reach (a handicap never inflates it). (The 2.4.5
#                retune lifted the floor from 0.8/2.4 — that bottom end was too severe.)
#combo-reach-handicap:
#  reach-scale: 0.87
