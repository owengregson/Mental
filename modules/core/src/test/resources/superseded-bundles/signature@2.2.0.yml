# ──────────────────────────────────────────────────────────────────────────
#  signature — Mental's signature knockback
#
#  An ORIGINAL Mental tuning (not a ported fork config) derived from the
#  archived `velt` shape. It keeps velt's late-era "dead consistent" feel —
#  near-total residual wipe (friction 0.1, nothing stacks), a vertical pinned
#  at exactly 0.36 every grounded hit (cap == base), and the full 0.5 sprint
#  horizontal so w-tapping still decides trades — with ONE change.
#
#  The change:  air.horizontal 1.0 -> 0.92  (everything else is velt verbatim).
#
#  Why:  a combo's opener lands on a GROUNDED victim, whose launch tick decays
#  at ground drag (stone ~0.546); every follow-up lands on an AIRBORNE victim,
#  whose launch tick decays at air drag (0.91). For the same launch velocity
#  the airborne hit keeps 0.91/0.546 ~ 1.67x as much horizontal on that first
#  tick, so hits 2+ carry the victim a hair past the reach pocket and the
#  combo "drifts." The engine applies the `air` multipliers ONLY to airborne
#  victims, so air.horizontal is the one knob that retunes the follow-ups
#  WITHOUT touching the grounded opener, the sprint bonus, the 0.36 vertical,
#  or the residual wipe.
#
#  The magnitude:  full grounded-parity over the 2-tick combo window would be
#  ~0.81 (a 19% cut) — that over-damps and feels sticky. 0.92 is ~40% of the
#  way there: it removes ~0.063 (~8%) of horizontal launch velocity per
#  airborne hit, ~a tenth of a block of pocket creep per inter-hit interval at
#  combo cadence. Enough to hold reach, small enough to keep velt's punch.
#  Vertical is left at 1.0 on purpose — the complaint is distance, not height,
#  and the pinned 0.36 is the signature.
#
#  This preset is regenerated when the file is missing; your edits stay.
# ──────────────────────────────────────────────────────────────────────────
display-name: Signature
description: "Mental's signature feel — velt's residual wipe and pinned 0.36 vertical, with airborne combo hits trimmed 8% to hold the reach pocket."

knockback:
  base:
    horizontal: 0.325
    vertical: 0.36
  vertical-mode: add
  extra:
    horizontal: 0.5
    vertical: 0.0
  wtap-extra:
    enabled: false
    horizontal: 0.5
    vertical: 0.0
  friction:
    x: 0.1
    y: 0.1
    z: 0.1
  limits:
    # Equal to the base on purpose: every grounded hit pins at 0.36.
    vertical: 0.36
    vertical-min: -3.9
    horizontal: -1
  air:
    # The signature tweak. 0.92 trims the horizontal push for AIRBORNE victims
    # only — i.e. the second-and-later combo hits — by 8%, holding the victim
    # in the reach pocket without touching the grounded opener (hit 1) or
    # velt's vertical. See the header for the full derivation.
    horizontal: 0.92
    vertical: 1.0
  add:
    horizontal: 0.0
    vertical: 0.0
  range-reduction:
    enabled: false
    start-distance: 3.0
    factor: 0.025
    offset: 1.2
    max-reduction: 0.12
  # When the victim's client receives the knock relative to their physics
  # tick. The 1.7.10 tracker wire was CONNECTION-ORDER bimodal (measured on
  # vanilla, both orders: a victim who joined before their attacker received
  # the full stamp — identical to 1.8.9 — a victim who joined after, one
  # friction step less). tracker ships the full stamp, the dominant era
  # experience; tracker-decayed opts into the later-joiner wire (ground
  # hits lose ×0.546 horizontal); immediate = the 1.8.9 in-attack send.
  # Rod/projectile knocks rode the tracker on BOTH eras.
  delivery:
    melee: tracker
    projectile: tracker
  modifiers:
    sprint: 1.0
    # Matches velt: at 0.1 survival a ledger residual contributes under 0.03
    # blocks of push, so the flat feel the wipe was built for is preserved.
    combos: false
    # `none` avoids surprise zero-knock cancels on modern gear.
    armor-resistance: none
    shield-blocking-cancels: true
