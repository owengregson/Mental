# ──────────────────────────────────────────────────────────────────────────
#  kohi — the canonical Kohi/HCF knockback (2016)
#
#  The most-shared knockback preset in the legacy ecosystem, confirmed
#  across three independent sources and matching the archived kohi2016
#  values byte-for-byte (sprytex/Knockback-Values, verified 2026-06-12).
#  Kohi published these as a friction DIVISOR of 2.0 — Mental's friction is
#  the SURVIVING FRACTION, so 2.0 ÷ becomes 0.5 here.
#
#  Original knobs:  friction 2.0 ÷ · horizontal 0.35 · vertical 0.35 ·
#                   vertical-limit 0.4 · extra-h 0.425 · extra-v 0.085
#  The 2015 season ran slightly hotter: friction 1.9 ÷ (0.5263) · 0.36 ·
#  0.36 · limit 0.36 · extra 0.45/0.09 — copy this file to run that year.
#
#  Kohi was THE 1.7.10 HCF server — its own plugin source (released by its
#  developer prplz) imports v1_7_R4, and it admitted 1.8 clients through a
#  protocol hack. Stock 1.7.10 lineage never reverts victim motion after
#  melee, so combos compound through the residual ledger — the "Kohi
#  combo" the community remembers — and delivery rides the 1.7.10 tracker
#  wire. One honest caveat: some late-era 1.7.10 forks backported the
#  SportBukkit velocity revert (flat melee), and Kohi's production fork
#  was never public — combos: true ships the attested feel, not a read of
#  their code.
#
#  This preset is regenerated when the file is missing; your edits stay.
# ──────────────────────────────────────────────────────────────────────────
display-name: Kohi
description: "The canonical Kohi/HCF values — lower base, smaller per-level bonus (0.425/0.085), 1.7.10 ledger combos."

knockback:
  base:
    horizontal: 0.35
    vertical: 0.35
  vertical-mode: add
  extra:
    horizontal: 0.425
    vertical: 0.085
  wtap-extra:
    enabled: false
    horizontal: 0.425
    vertical: 0.085
  friction:
    x: 0.5
    y: 0.5
    z: 0.5
  limits:
    vertical: 0.4
    vertical-min: -3.9
    horizontal: -1
  air:
    horizontal: 1.0
    vertical: 1.0
  add:
    horizontal: 0.0
    vertical: 0.0
  range-reduction:
    enabled: false
    start-distance: 3.0
    factor: 0.025
    offset: 1.2
    max-reduction: 0.12
  # When the victim's client receives the knock relative to their physics
  # tick. The 1.7.10 tracker wire was CONNECTION-ORDER bimodal (measured on
  # vanilla, both orders: a victim who joined before their attacker received
  # the full stamp — identical to 1.8.9 — a victim who joined after, one
  # friction step less). tracker ships the full stamp, the dominant era
  # experience; tracker-decayed opts into the later-joiner wire (ground
  # hits lose ×0.546 horizontal); immediate = the 1.8.9 in-attack send.
  # Rod/projectile knocks rode the tracker on BOTH eras.
  delivery:
    melee: tracker
    projectile: tracker
  modifiers:
    sprint: 1.0
    # 1.7.10 lineage: the server never reverted victim motion after melee,
    # so hits compound through the residual ledger — the Kohi combo.
    combos: true
    # The 1.7 item pool had nothing knockback-resistant (same reasoning as
    # legacy-1.7): `none` avoids surprise zero-knock cancels on modern gear.
    armor-resistance: none
    shield-blocking-cancels: true
